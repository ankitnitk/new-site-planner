<script type="text/babel">
const { useRef, useState } = React;

/* =========================
   File parsing (CSV / XLSX)
   ========================= */
const readBuf = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = e => res(e.target.result);
  r.onerror = rej;
  r.readAsArrayBuffer(file);
});

function parseCSVText(text) {
  const clean = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim();
  const first = clean.split("\n")[0] || "";
  const sep = first.split(";").length > first.split(",").length ? ";" : ",";
  const split = (line) => {
    if (sep === ";") return line.split(";").map(v => v.trim().replace(/^"|"$/g,""));
    const out = []; let q=false, c="";
    for (const ch of line) {
      if (ch === '"') { q=!q; continue; }
      if (ch === "," && !q) { out.push(c.trim()); c=""; continue; }
      c += ch;
    }
    out.push(c.trim());
    return out.map(v => v.replace(/^"|"$/g,""));
  };
  const lines = clean.split("\n");
  const headers = split(lines[0] || "");
  const rows = lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = split(l);
    const o = {};
    headers.forEach((h,i) => o[h] = (vals[i] ?? "").trim());
    return o;
  });
  return { headers, rows, sheetName: null, allSheets: [] };
}

function pickSheet(names, preferred) {
  if (!names || !names.length) return null;
  if (preferred) {
    const pl = preferred.toLowerCase();
    const exact = names.find(n => (n || "").toLowerCase() === pl);
    if (exact) return exact;
    const inc = names.find(n => (n || "").toLowerCase().includes(pl));
    if (inc) return inc;
  }
  return names[0];
}

async function parseFile(file, preferredSheet) {
  const buf = await readBuf(file);
  const ext = file.name.split(".").pop().toLowerCase();
  if (ext === "csv" || ext === "txt") {
    return parseCSVText(new TextDecoder().decode(buf));
  }
  const wb = XLSX.read(buf, { type:"array", cellDates:true });
  const sn = pickSheet(wb.SheetNames, preferredSheet);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[sn], { defval:"", raw:false });
  const headers = json.length ? Object.keys(json[0]) : [];
  const rows = json.map(r => {
    const o = {};
    Object.entries(r).forEach(([k,v]) => o[k] = String(v).trim());
    return o;
  });
  return { headers, rows, sheetName: sn, allSheets: wb.SheetNames };
}

/* =========================
   Column detection
   ========================= */
const norm = s => String(s||"").toLowerCase().replace(/[\s_\-\.]/g,"");
const findCol = (headers, patterns) => {
  const h = headers.map(norm);
  for (const p of patterns) {
    const idx = h.findIndex(x => x.includes(norm(p)));
    if (idx >= 0) return headers[idx];
  }
  return "";
};

const detectGisCols = (h) => ({
  siteName: findCol(h, ["lnbts","site_name","sitename","site","enodeb","bts"]),
  cellName: findCol(h, ["lncel","wcell","cell name","cellname","cell","sector"]),
  lat: findCol(h, ["lat","latitude","y_coord","ylat","y"]),
  lon: findCol(h, ["lon","lng","longitude","x_coord","xlon","x"]),
});

const detectSumCols = (h) => ({
  cellName: findCol(h, ["lncel","cell name","cellname","cell"]),
  pci: findCol(h, ["pci","physicalcellid","physcellid"]),
  rsi: findCol(h, ["rsi","rootsequenceindex","root seq index","rootsequence"]),
  tac: findCol(h, ["tac","trackingareacode","tracking area code"]),
});

const detectNewCols = (h) => ({
  siteName: findCol(h, ["new site name","site name","sitename","lnbts","name","site"]),
  siteId: findCol(h, ["new site id","site id","siteid","lnbts id","id"]),
  lat: findCol(h, ["lat","latitude","y_coord","ylat","y"]),
  lon: findCol(h, ["lon","lng","longitude","x_coord","xlon","x"]),
  sector: findCol(h, ["sector","sec","cell","lncel","azimuth"]),
});

/* =========================
   Geo helpers
   ========================= */
const toRad = d => d * Math.PI / 180;
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* =========================
   Planned sites builder
   ========================= */
let _uid = 0;
const uid = () => ++_uid;

function buildPlannedSites(rows, m) {
  const map = new Map();
  rows.forEach(r => {
    const name = (r[m.siteName] || "").trim();
    if (!name) return;
    const lat = parseFloat(r[m.lat]);
    const lon = parseFloat(r[m.lon]);
    if (isNaN(lat) || isNaN(lon)) return;

    const siteId = (m.siteId && (r[m.siteId] || "").trim()) || name;
    if (!map.has(name)) map.set(name, { id: uid(), name, siteId, lat, lon, sectors: [] });

    const secLabel = m.sector ? (r[m.sector] || "").trim() : "";
    map.get(name).sectors.push({ label: secLabel || `S${map.get(name).sectors.length + 1}` });
  });
  return [...map.values()];
}

/* =========================
   Planner core (final rules)
   ========================= */
function rangeList(min, max) {
  const lo = Math.min(min, max);
  const hi = Math.max(min, max);
  const out = [];
  for (let i = lo; i <= hi; i++) out.push(i);
  return out;
}

function rotatedRange(min, max) {
  const arr = rangeList(min, max);
  if (arr.length <= 1) return arr;
  const start = Math.floor(Math.random() * arr.length);
  return [...arr.slice(start), ...arr.slice(0, start)];
}

function reuseRadii(minReuseKm) {
  const base = Number(minReuseKm);
  const start = 3 * base;
  const step = 0.1 * base;
  const end  = 0.1 * base;
  const radii = [];
  if (!isFinite(base) || base <= 0 || !isFinite(step) || step <= 0) return radii;

  const steps = Math.floor((start - end) / step + 1e-9) + 1;
  for (let i = 0; i < steps; i++) {
    const r = start - i * step;
    if (r < end - 1e-9) break;
    radii.push(Math.round(r * 1000000) / 1000000);
  }
  if (radii.length && Math.abs(radii[radii.length - 1] - end) > 1e-6) radii.push(end);
  return radii;
}

function pickBestSpread(cands, usedNearby) {
  if (!cands.length) return null;
  const used = usedNearby.filter(v => v !== null && v !== undefined && !isNaN(v));
  if (!used.length) return cands[Math.floor(Math.random() * cands.length)];

  let best = null, bestScore = -1;
  for (const v of cands) {
    const score = Math.min(...used.map(u => Math.abs(v - u)));
    if (score > bestScore) { bestScore = score; best = v; }
    else if (score === bestScore) { if (Math.random() < 0.5) best = v; }
  }
  return best;
}

function nearestSameValueInfo(allCells, lat, lon, field, value) {
  if (value === null || value === undefined || isNaN(Number(value))) return { cell: "", km: "" };
  const v = Number(value);
  let best = null;
  for (const c of allCells) {
    const cv = Number(c[field]);
    if (isNaN(cv) || cv !== v) continue;
    if (isNaN(c.lat) || isNaN(c.lon)) continue;
    const d = haversineKm(lat, lon, c.lat, c.lon);
    if (best === null || d < best.km) best = { cell: c.cellName || c.siteName || "", km: d };
  }
  if (!best) return { cell: "None (unique)", km: "∞" };
  return { cell: best.cell || "", km: Math.round(best.km * 1000) / 1000 };
}

function nearestUnknownRemark(baseCells, lat, lon, minReuseKm) {
  const R = Number(minReuseKm);
  if (!isFinite(R) || R <= 0) return "";
  let best = null;
  for (const c of baseCells) {
    if (isNaN(c.lat) || isNaN(c.lon)) continue;
    const d = haversineKm(lat, lon, c.lat, c.lon);
    if (d > R) continue;

    const pciKnown = !(c.pci === null || c.pci === undefined || isNaN(Number(c.pci)));
    const rsiKnown = !(c.rsi === null || c.rsi === undefined || isNaN(Number(c.rsi)));
    if (pciKnown && rsiKnown) continue;

    if (best === null || d < best.km) {
      best = { name: c.siteName || c.cellName || "UnknownSite", km: d, pciKnown, rsiKnown };
    }
  }
  if (!best) return "";
  const miss = (!best.pciKnown && !best.rsiKnown) ? "PCI/RSI unknown"
              : (!best.pciKnown) ? "PCI unknown"
              : "RSI unknown";
  return `Site ${best.name} at ${best.km.toFixed(1)}Km but ${miss}`;
}

function assignPCI({ siteAssignedPcis, allCells, siteLat, siteLon, pciMin, pciMax, minReuseKm }) {
  const pool = rotatedRange(pciMin, pciMax);
  for (const R of reuseRadii(minReuseKm)) {
    const nearby = allCells.filter(c => !isNaN(c.lat) && !isNaN(c.lon) && haversineKm(siteLat, siteLon, c.lat, c.lon) <= R);
    const usedPci = nearby.map(c => Number(c.pci)).filter(v => !isNaN(v));
    const forbidden = new Set([...usedPci, ...siteAssignedPcis]);
    const cands = pool.filter(v => !forbidden.has(v));
    const pick = pickBestSpread(cands, usedPci);
    if (pick !== null) return { value: pick, reuseKm: R };
  }
  return { value: null, reuseKm: null };
}

function assignRSI({ siteAssignedRsis, allCells, siteLat, siteLon, rsiMin, rsiMax, minReuseKm, minGap }) {
  const pool = rotatedRange(rsiMin, rsiMax);
  const violatesSiteGap = (v) => siteAssignedRsis.some(x => x !== null && x !== undefined && !isNaN(x) && Math.abs(v - x) < minGap);

  for (const R of reuseRadii(minReuseKm)) {
    const nearby = allCells.filter(c => !isNaN(c.lat) && !isNaN(c.lon) && haversineKm(siteLat, siteLon, c.lat, c.lon) <= R);
    const usedRsi = nearby.map(c => Number(c.rsi)).filter(v => !isNaN(v));
    const forbidden = new Set(usedRsi);
    const cands = pool.filter(v => !forbidden.has(v) && !violatesSiteGap(v));
    const pick = pickBestSpread(cands, [...usedRsi, ...siteAssignedRsis]);
    if (pick !== null) return { value: pick, reuseKm: R };
  }
  return { value: null, reuseKm: null };
}

function nearestSiteTac({ baseCells, siteLat, siteLon }) {
  const bySite = new Map();
  baseCells.forEach(c => {
    if (!c.siteName || isNaN(c.lat) || isNaN(c.lon)) return;
    if (!bySite.has(c.siteName)) bySite.set(c.siteName, []);
    bySite.get(c.siteName).push(c);
  });

  let bestSite = null, bestDist = Infinity;
  for (const [sn, cells] of bySite.entries()) {
    const clat = cells.reduce((s,x)=>s+Number(x.lat),0) / cells.length;
    const clon = cells.reduce((s,x)=>s+Number(x.lon),0) / cells.length;
    const d = haversineKm(siteLat, siteLon, clat, clon);
    if (d < bestDist) { bestDist = d; bestSite = sn; }
  }
  if (!bestSite) return { nearestSite: "", tac: "" };

  const freq = new Map();
  (bySite.get(bestSite) || []).forEach(c => {
    const t = c.tac;
    if (t === null || t === undefined || t === "") return;
    const num = Number(t);
    if (isNaN(num)) return;
    const k = String(num);
    freq.set(k, (freq.get(k) || 0) + 1);
  });
  if (!freq.size) return { nearestSite: bestSite, tac: "" };

  const max = Math.max(...freq.values());
  const modes = [...freq.entries()].filter(([k,v]) => v === max).map(([k]) => k).sort((a,b)=>Number(a)-Number(b));
  return { nearestSite: bestSite, tac: modes.join(", ") };
}

/* =========================
   Async planner with progress + yielding (no hung UI) [1](https://onedrive.live.com?cid=9E5F83236A07AAB3&id=9E5F83236A07AAB3!s5accec931be54e88849b08e3f323ca93)
   ========================= */
const yield_ = () => new Promise(r => setTimeout(r, 0));

async function planAllAsync(plannedSites, baseCells, cfg, onProgress) {
  const out = [];
  const plannedSectors = [];
  const allCells = () => [...baseCells, ...plannedSectors];

  const totalSectors = plannedSites.reduce((s,p)=>s + (p.sectors?.length || 0), 0);
  let done = 0;

  for (let si = 0; si < plannedSites.length; si++) {
    const site = plannedSites[si];
    const siteAssignedPcis = [];
    const siteAssignedRsis = [];
    const { nearestSite, tac } = nearestSiteTac({ baseCells, siteLat: site.lat, siteLon: site.lon });

    for (let ti = 0; ti < site.sectors.length; ti++) {
      onProgress && onProgress({ done, total: totalSectors, siteName: site.name, sectorIndex: ti, phase: "planning" });
      await yield_();

      const work = allCells();

      const pciRes = assignPCI({
        siteAssignedPcis,
        allCells: work,
        siteLat: site.lat, siteLon: site.lon,
        pciMin: cfg.pciMin, pciMax: cfg.pciMax,
        minReuseKm: cfg.minReuseKm
      });
      if (pciRes.value !== null) siteAssignedPcis.push(pciRes.value);

      const rsiRes = assignRSI({
        siteAssignedRsis,
        allCells: work,
        siteLat: site.lat, siteLon: site.lon,
        rsiMin: cfg.rsiMin, rsiMax: cfg.rsiMax,
        minReuseKm: cfg.minReuseKm,
        minGap: cfg.minRsiGap
      });
      if (rsiRes.value !== null) siteAssignedRsis.push(rsiRes.value);

      const pciQA = pciRes.value !== null ? nearestSameValueInfo(work, site.lat, site.lon, "pci", pciRes.value) : { cell:"", km:"" };
      const rsiQA = rsiRes.value !== null ? nearestSameValueInfo(work, site.lat, site.lon, "rsi", rsiRes.value) : { cell:"", km:"" };
      const remark = nearestUnknownRemark(baseCells, site.lat, site.lon, cfg.minReuseKm);

      out.push({
        "New Site Name": site.name,
        "New Site ID": site.siteId || "",
        "Lat": site.lat,
        "Long": site.lon,

        "Planned PCI": pciRes.value !== null ? pciRes.value : "Not possible",
        "PCI reuse distance (km)": pciRes.reuseKm !== null ? (Math.round(pciRes.reuseKm * 1000) / 1000) : "",
        "Nearest same-PCI cell (QA)": pciRes.value !== null ? pciQA.cell : "",
        "Same-PCI distance (km) (QA)": pciRes.value !== null ? pciQA.km : "",

        "Planned RSI": rsiRes.value !== null ? rsiRes.value : "Not possible",
        "RSI reuse distance (km)": rsiRes.reuseKm !== null ? (Math.round(rsiRes.reuseKm * 1000) / 1000) : "",
        "Nearest same-RSI cell (QA)": rsiRes.value !== null ? rsiQA.cell : "",
        "Same-RSI distance (km) (QA)": rsiRes.value !== null ? rsiQA.km : "",

        "Planned TAC": tac || "",
        "Nearest Site Name": nearestSite || "",
        "Remark": remark
      });

      plannedSectors.push({
        siteName: site.name,
        cellName: `${site.name}_${site.sectors[ti].label || ("S"+(ti+1))}`,
        lat: site.lat,
        lon: site.lon,
        pci: (pciRes.value !== null && !isNaN(pciRes.value)) ? pciRes.value : null,
        rsi: (rsiRes.value !== null && !isNaN(rsiRes.value)) ? rsiRes.value : null,
        tac: tac || null
      });

      done++;
      onProgress && onProgress({ done, total: totalSectors, siteName: site.name, sectorIndex: ti, phase: "planning" });
      if (done % 3 === 0) await yield_();
    }
  }

  onProgress && onProgress({ done: totalSectors, total: totalSectors, siteName: plannedSites.at(-1)?.name || "", sectorIndex: 0, phase: "done" });
  return out;
}

/* =========================
   Export XLSX
   ========================= */
function exportXlsx(rows) {
  const ws = XLSX.utils.json_to_sheet(rows);
  const HDR = {
    fill: { patternType: "solid", fgColor: { rgb: "1D4ED8" } },
    font: { bold: true, color: { rgb: "FFFFFF" } },
    alignment: { horizontal: "center", vertical: "center" }
  };
  if (ws["!ref"]) {
    const range = XLSX.utils.decode_range(ws["!ref"]);
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: 0, c: C });
      if (ws[addr]) ws[addr].s = HDR;
    }
    ws["!views"] = [{ state: "frozen", xSplit: 0, ySplit: 1, topLeftCell: "A2", activePane: "bottomLeft" }];
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "LTE Plan");
  XLSX.writeFile(wb, "lte_pci_rsi_tac_plan.xlsx", { cellStyles: true });
}

/* =========================
   UI Components
   ========================= */
function Steps({ current }) {
  const items = ["Load data", "Configure", "Results"];
  return (
    <div className="steps" style={{marginBottom:12}}>
      {items.map((t,i) => {
        const n = i+1;
        const cls = n === current ? "step active" : (n < current ? "step done" : "step");
        return (
          <div key={n} className={cls}>
            <div className="dot">{n < current ? "✓" : n}</div>
            <div style={{fontWeight:800}}>{t}</div>
          </div>
        );
      })}
    </div>
  );
}

function FileBlock({ title, hint, onLoad, sheetHint }) {
  const inputRef = useRef(null);
  const [loading, setLoading] = useState(false);
  const [meta, setMeta] = useState(null);

  const pick = () => inputRef.current?.click();

  const handle = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setLoading(true);
    try {
      const d = await parseFile(file, sheetHint);
      setMeta({ rows: d.rows.length, sheet: d.sheetName });
      onLoad(d, file.name);
    } catch (err) {
      alert("Failed to read file: " + (err?.message || err));
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="card">
      <div style={{fontWeight:900, fontSize:14}}>{title}</div>
      <div className="small" style={{margin:"6px 0 10px"}}>{hint}</div>
      <input ref={inputRef} type="file" accept=".csv,.xlsx,.xls,.txt" style={{display:"none"}} onChange={handle} />
      <button onClick={pick} disabled={loading}>{loading ? "Reading…" : "Upload file"}</button>
      {meta && <div className="ok">✓ {meta.rows.toLocaleString()} rows{meta.sheet ? ` · sheet: "${meta.sheet}"` : ""}</div>}
    </div>
  );
}

function ColMapper({ headers, mapping, onChange, fields }) {
  return (
    <div className="card" style={{marginTop:-6}}>
      <div style={{fontWeight:900, marginBottom:10}}>Column mapping</div>
      <div className="row">
        {Object.entries(fields).map(([key,label]) => (
          <div className="col" key={key} style={{minWidth:240}}>
            <div className="label">{label}</div>
            <select
              className="mono"
              value={mapping[key] || ""}
              onChange={e => onChange({ ...mapping, [key]: e.target.value })}  /* ✅ FIXED */
            >
              <option value="">— select —</option>
              {headers.map(h => <option key={h} value={h}>{h}</option>)}
            </select>
          </div>
        ))}
      </div>
    </div>
  );
}

/* =========================
   App
   ========================= */
function App() {
  const [step, setStep] = useState(1);
  const [err, setErr] = useState("");

  const [gisData, setGisData] = useState(null);
  const [gisMap, setGisMap] = useState({});
  const [sumData, setSumData] = useState(null);
  const [sumMap, setSumMap] = useState({});
  const [nsData, setNsData] = useState(null);
  const [nsMap, setNsMap] = useState({});

  const [cfg, setCfg] = useState({
    minReuseKm: 20,
    minRsiGap: 20,
    pciMin: 0,
    pciMax: 502,
    rsiMin: 0,
    rsiMax: 837
  });

  const [results, setResults] = useState(null);

  const [planning, setPlanning] = useState(false);
  const [prog, setProg] = useState({ done: 0, total: 0, siteName: "", sectorIndex: 0, phase: "" });

  const canContinue = gisData && sumData && nsData;

  const onGisLoad = (d) => { setGisData(d); setGisMap(detectGisCols(d.headers)); };
  const onSumLoad = (d) => { setSumData(d); setSumMap(detectSumCols(d.headers)); };
  const onNsLoad  = (d) => { setNsData(d);  setNsMap(detectNewCols(d.headers)); };

  const runPlan = async () => {
    setErr("");
    setResults(null);

    if (!gisData || !sumData || !nsData) { setErr("Upload all 3 files first."); return; }

    const lookup = {};
    sumData.rows.forEach(r => {
      const cn = (r[sumMap.cellName] || "").trim();
      if (!cn) return;
      const pci = Number(r[sumMap.pci]);
      const rsi = Number(r[sumMap.rsi]);
      const tacRaw = r[sumMap.tac];
      lookup[cn] = {
        pci: isNaN(pci) ? null : pci,
        rsi: isNaN(rsi) ? null : rsi,
        tac: (tacRaw === undefined || tacRaw === null || String(tacRaw).trim() === "" || isNaN(Number(tacRaw))) ? null : Number(tacRaw)
      };
    });

    const baseCells = gisData.rows.map(r => {
      const siteName = (r[gisMap.siteName] || "").trim();
      const cellName = (r[gisMap.cellName] || "").trim();
      const lat = parseFloat(r[gisMap.lat]);
      const lon = parseFloat(r[gisMap.lon]);
      if (!siteName || !cellName || isNaN(lat) || isNaN(lon)) return null;
      const extra = lookup[cellName] || {};
      return { siteName, cellName, lat, lon, pci: extra.pci ?? null, rsi: extra.rsi ?? null, tac: extra.tac ?? null };
    }).filter(Boolean);

    if (!baseCells.length) { setErr("No valid rows after GIS mapping. Check column mapping."); return; }

    const plannedSites = buildPlannedSites(nsData.rows, nsMap);
    if (!plannedSites.length) { setErr("No valid rows in New Sites after mapping. Need Site + Lat + Lon."); return; }

    const minReuseKm = Number(cfg.minReuseKm);
    const minRsiGap = Number(cfg.minRsiGap);
    const pciMin = Number(cfg.pciMin), pciMax = Number(cfg.pciMax);
    const rsiMin = Number(cfg.rsiMin), rsiMax = Number(cfg.rsiMax);

    if (!isFinite(minReuseKm) || minReuseKm <= 0) { setErr("Minimum reuse distance must be positive."); return; }
    if (!isFinite(minRsiGap) || minRsiGap <= 0) { setErr("Minimum RSI gap must be positive."); return; }

    const totalSectors = plannedSites.reduce((s,p)=>s + (p.sectors?.length || 0), 0);
    setPlanning(true);
    setProg({ done: 0, total: totalSectors, siteName: plannedSites[0]?.name || "", sectorIndex: 0, phase: "planning" });

    try {
      const out = await planAllAsync(plannedSites, baseCells, {
        minReuseKm, minRsiGap, pciMin, pciMax, rsiMin, rsiMax
      }, (p) => setProg({ done: p.done, total: p.total, siteName: p.siteName || "", sectorIndex: p.sectorIndex || 0, phase: p.phase || "" }));

      setResults(out);
      setStep(3);
    } finally {
      setPlanning(false);
    }
  };

  const pct = prog.total > 0 ? Math.min(100, Math.round((prog.done / prog.total) * 100)) : 0;

  return (
    <div>
      <div className="card">
        <div style={{display:"flex", gap:12, alignItems:"center", flexWrap:"wrap"}}>
          <div style={{flex:1, minWidth:280}}>
            <div style={{fontSize:18, fontWeight:1000}}>LTE PCI / RSI / TAC Planner</div>
            <div className="small" style={{marginTop:6}}>
              If a neighbour within Minimum Reuse has missing PCI/RSI in Summary, output includes a Remark like:
              <span className="mono"> Site X at 18.0Km but PCI/RSI unknown</span>.
            </div>
          </div>
          <Steps current={step} />
        </div>
      </div>

      {err && <div className="err">⚠ {err}</div>}

      {step === 1 && (
        <div>
          <div className="row">
            <div className="col">
              <FileBlock title="1) Current network GIS (CSV/XLSX)"
                hint="Required: Site/LNBTS, Cell/LNCEL, Latitude, Longitude"
                onLoad={onGisLoad} />
              {gisData && <ColMapper headers={gisData.headers} mapping={gisMap} onChange={setGisMap}
                fields={{ siteName:"Site name / LNBTS *", cellName:"Cell name / LNCEL *", lat:"Latitude *", lon:"Longitude *" }} />}
            </div>

            <div className="col">
              <FileBlock title="2) 4G Summary (CSV/XLSX)"
                hint='Required: LNCEL, PCI, RSI, TAC. Default sheet: "LNCEL Details".'
                onLoad={onSumLoad} sheetHint="LNCEL Details" />
              {sumData && <ColMapper headers={sumData.headers} mapping={sumMap} onChange={setSumMap}
                fields={{ cellName:"LNCEL *", pci:"PCI *", rsi:"RSI *", tac:"TAC *" }} />}
            </div>

            <div className="col">
              <FileBlock title="3) New Sites / Sectors to plan (CSV/XLSX)"
                hint="One row per sector. Required: New Site Name, Latitude, Longitude."
                onLoad={onNsLoad} />
              {nsData && <ColMapper headers={nsData.headers} mapping={nsMap} onChange={setNsMap}
                fields={{ siteName:"New Site Name *", siteId:"New Site ID", lat:"Latitude *", lon:"Longitude *", sector:"Sector label (optional)" }} />}
            </div>
          </div>

          <div style={{display:"flex", gap:10, alignItems:"center", marginTop:8}}>
            <button className="primary" disabled={!canContinue} onClick={() => {
              if (!canContinue) setErr("Upload all 3 files first.");
              else { setErr(""); setStep(2); }
            }}>
              Continue → Configure
            </button>
          </div>
        </div>
      )}

      {step === 2 && (
        <div className="card">
          <div style={{fontSize:15, fontWeight:1000, marginBottom:10}}>Configuration</div>

          <div className="grid2">
            <div>
              <div className="label">Minimum reuse distance (km)</div>
              <input className="mono" value={cfg.minReuseKm} onChange={e => setCfg(c => ({...c, minReuseKm: e.target.value}))} />
            </div>
            <div>
              <div className="label">Minimum RSI gap (within same new site only)</div>
              <input className="mono" value={cfg.minRsiGap} onChange={e => setCfg(c => ({...c, minRsiGap: e.target.value}))} />
            </div>
          </div>

          <div className="grid2" style={{marginTop:14}}>
            <div>
              <div className="label">PCI range (0..502)</div>
              <div className="row">
                <div className="col" style={{minWidth:150}}>
                  <input className="mono" value={cfg.pciMin} onChange={e => setCfg(c => ({...c, pciMin: e.target.value}))} />
                  <div className="small">min</div>
                </div>
                <div className="col" style={{minWidth:150}}>
                  <input className="mono" value={cfg.pciMax} onChange={e => setCfg(c => ({...c, pciMax: e.target.value}))} />
                  <div className="small">max</div>
                </div>
              </div>
            </div>

            <div>
              <div className="label">RSI range (0..837)</div>
              <div className="row">
                <div className="col" style={{minWidth:150}}>
                  <input className="mono" value={cfg.rsiMin} onChange={e => setCfg(c => ({...c, rsiMin: e.target.value}))} />
                  <div className="small">min</div>
                </div>
                <div className="col" style={{minWidth:150}}>
                  <input className="mono" value={cfg.rsiMax} onChange={e => setCfg(c => ({...c, rsiMax: e.target.value}))} />
                  <div className="small">max</div>
                </div>
              </div>
            </div>
          </div>

          <div style={{display:"flex", gap:10, marginTop:14, alignItems:"center"}}>
            <button onClick={() => setStep(1)} disabled={planning}>← Back</button>
            <button className="primary" onClick={runPlan} disabled={planning}>
              {planning ? "Planning…" : "Plan →"}
            </button>
            {planning && <span className="small mono" style={{marginLeft:6}}>{pct}% ({prog.done}/{prog.total})</span>}
          </div>

          {planning && (
            <div className="progressWrap">
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                <div className="small">
                  Planning <b className="mono">{Math.min(prog.done + 1, prog.total)}</b> / <b className="mono">{prog.total}</b>
                  {prog.siteName ? <> · Site: <b>{prog.siteName}</b></> : null}
                </div>
                <div className="small mono">{pct}%</div>
              </div>
              <div className="barOuter"><div className="barInner" style={{width: `${pct}%`}}></div></div>
              <div className="small" style={{marginTop:8}}>Working… UI stays responsive (yield between sectors). [1](https://onedrive.live.com?cid=9E5F83236A07AAB3&id=9E5F83236A07AAB3!s5accec931be54e88849b08e3f323ca93)</div>
            </div>
          )}
        </div>
      )}

      {step === 3 && results && (
        <div>
          <div className="card" style={{display:"flex", alignItems:"center", gap:10, flexWrap:"wrap"}}>
            <div style={{fontWeight:1000, fontSize:15}}>{results.length.toLocaleString()} sector row(s) planned</div>
            <div style={{marginLeft:"auto", display:"flex", gap:10}}>
              <button onClick={() => setStep(2)}>← Reconfigure</button>
              <button className="primary" onClick={() => exportXlsx(results)}>Export XLSX ↗</button>
            </div>
          </div>

          <div className="card" style={{overflowX:"auto", padding:0}}>
            <table>
              <thead>
                <tr>
                  {Object.keys(results[0] || {}).map(h => <th key={h}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {results.map((r, i) => (
                  <tr key={i}>
                    {Object.keys(results[0] || {}).map(k => {
                      const v = r[k];
                      const isNp = String(v) === "Not possible";
                      return (
                        <td key={k} className={(k.includes("Planned PCI") || k.includes("Planned RSI")) ? "mono" : ""} style={isNp ? {color:"#b91c1c", fontWeight:900} : {}}>
                          {String(v ?? "")}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
