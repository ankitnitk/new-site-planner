// ── Map helpers ──────────────────────────────────────────────────────────────
function destPoint(lat,lon,bearingDeg,distKm){
  const R=6371,d=distKm/R,brng=bearingDeg*Math.PI/180;
  const lat1=lat*Math.PI/180,lon1=lon*Math.PI/180;
  const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(brng));
  const lon2=lon1+Math.atan2(Math.sin(brng)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
  return [lat2*180/Math.PI,((lon2*180/Math.PI)+540)%360-180];
}
function sectorWedge(lat,lon,az,beamWidthDeg,radiusKm){
  const half=beamWidthDeg/2,steps=18,pts=[[lat,lon]];
  for(let i=0;i<=steps;i++) pts.push(destPoint(lat,lon,az-half+beamWidthDeg*i/steps,radiusKm));
  return pts;
}
const MAP_PALETTE=['#e63946','#2196f3','#4caf50','#ff9800','#9c27b0','#00bcd4','#ff5722','#3f51b5','#8bc34a','#f06292','#009688','#ffc107','#673ab7','#795548'];
// Deterministic colour: same BCCH always gets the same colour regardless of plan size
function bcchToColor(bcch){
  if(bcch==null) return '#888';
  // multiply-hash so nearby ARFCNs get different palette slots
  return MAP_PALETTE[(Math.abs(Number(bcch)*2654435761|0))%MAP_PALETTE.length];
}

// ── Map view component ────────────────────────────────────────────────────────
function PlanMap({results,cells,activeSite,setActiveSite,activeTab,setActiveTab,cfg,visible}){
  const {useRef,useEffect,useState,useMemo}=React;
  const divRef=useRef(null);
  const mapRef=useRef(null);
  const layers=useRef([]);
  const initialFitDone=useRef(false);
  const [mapBW,setMapBW]=useState(30);
  const [mapLenKm,setMapLenKm]=useState(null); // null = auto

  // Auto length: 20% of minimum inter-site distance (planned↔neighbour and planned↔planned)
  const autoLen=useMemo(()=>{
    if(!results||!results.length) return 1.0;
    let minDist=Infinity;
    results.forEach(({sectorResults})=>{
      sectorResults.forEach(sec=>{
        sec.externalNeighbors.forEach(nb=>{ if(nb.dist>0.05) minDist=Math.min(minDist,nb.dist); });
      });
    });
    for(let i=0;i<results.length;i++) for(let j=i+1;j<results.length;j++){
      const lat1=parseFloat(results[i].site.lat),lon1=parseFloat(results[i].site.lon);
      const lat2=parseFloat(results[j].site.lat),lon2=parseFloat(results[j].site.lon);
      if(!isNaN(lat1)&&!isNaN(lon1)&&!isNaN(lat2)&&!isNaN(lon2)){
        const d=haversineKm(lat1,lon1,lat2,lon2);
        if(d>0.05) minDist=Math.min(minDist,d);
      }
    }
    return minDist===Infinity?1.0:Math.max(0.2,minDist*0.20);
  },[results]);

  useEffect(()=>{
    if(!divRef.current||!results||!results.length) return;

    // Init Leaflet map once
    if(!mapRef.current){
      const lats=results.map(r=>parseFloat(r.site.lat)).filter(x=>!isNaN(x));
      const lons=results.map(r=>parseFloat(r.site.lon)).filter(x=>!isNaN(x));
      const clat=lats.reduce((a,b)=>a+b,0)/lats.length;
      const clon=lons.reduce((a,b)=>a+b,0)/lons.length;
      mapRef.current=L.map(divRef.current,{preferCanvas:true}).setView([clat,clon],12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',maxZoom:19
      }).addTo(mapRef.current);
    }

    // Invalidate size after show (fixes blank tile issue)
    mapRef.current.invalidateSize();

    // Remove old layers
    layers.current.forEach(l=>l.remove());
    layers.current=[];

    const M=mapRef.current;
    const bw=mapBW;
    const rKm=mapLenKm!==null?mapLenKm:autoLen;

    const selSite=results[activeSite];
    const selSec=selSite?.sectorResults?.[activeTab];
    const selLat=parseFloat(selSite?.site?.lat);
    const selLon=parseFloat(selSite?.site?.lon);

    // Build set of neighbour site names for the selected sector (all tiers)
    const nbSiteNames=new Set();
    const nbCellNames=new Set();
    if(selSec){
      selSec.externalNeighbors.forEach(nb=>{
        if(nb.siteName) nbSiteNames.add(nb.siteName);
        if(nb.cellName) nbCellNames.add(nb.cellName);
      });
    }

    // Group existing cells by siteName for full-site wedge rendering
    const cellsBySite={};
    cells.forEach(c=>{
      if(isNaN(c.lat)||isNaN(c.lon)) return;
      const sn=c.siteName||c.cellName||'__nosite';
      if(!cellsBySite[sn]) cellsBySite[sn]=[]; cellsBySite[sn].push(c);
    });

    // Background cells — grey dots for non-neighbour sites, wedges for neighbour sites
    cells.forEach(c=>{
      if(isNaN(c.lat)||isNaN(c.lon)) return;
      const isNbSite=nbSiteNames.has(c.siteName)||nbCellNames.has(c.cellName);
      if(isNbSite) return; // drawn separately as wedges below
      const mk=L.circleMarker([c.lat,c.lon],{radius:3,color:'#888',fillColor:'#bbb',fillOpacity:0.45,weight:0.5});
      mk.bindTooltip(`${c.cellName||''} · Az ${c.azimuth!=null?c.azimuth+'°':'—'} · BCCH ${c.bcch!=null?c.bcch:'—'}`,{sticky:true,className:'lf-tip'});
      mk.addTo(M); layers.current.push(mk);
    });

    // Neighbour site wedges — draw ALL sectors of each neighbour site
    if(selSec){
      // Collect tier + tierLabel per cell name for border colour and tooltip
      const nbTierMap={};    // cellName → tier number
      const nbLabelMap={};   // cellName → tierLabel
      selSec.externalNeighbors.forEach(nb=>{
        if(nb.cellName){ nbTierMap[nb.cellName]=nb.tier; nbLabelMap[nb.cellName]=nb.tierLabel||String(nb.tier); }
      });

      const drawnNbSites=new Set();
      selSec.externalNeighbors.forEach(nb=>{
        if(isNaN(nb.lat)||isNaN(nb.lon)) return;
        const sn=nb.siteName||nb.cellName;
        if(drawnNbSites.has(sn)) return; drawnNbSites.add(sn);
        // All cells at this site (same siteName)
        const siteCells=nb.siteName
          ? cells.filter(c=>c.siteName===nb.siteName&&!isNaN(c.lat)&&!isNaN(c.lon))
          : cells.filter(c=>c.cellName===nb.cellName&&!isNaN(c.lat)&&!isNaN(c.lon));
        // Also include the neighbour itself in case it's missing from cells list
        const toRender=siteCells.length?siteCells:[nb];

        toRender.forEach(c=>{
          const az=parseFloat(c.azimuth)||0;
          const col=bcchToColor(c.bcch);
          const cellTier=nbTierMap[c.cellName];
          const cellLabel=nbLabelMap[c.cellName];
          // Per-cell border colour based on effective tier (T2~ is tier=2 → blue, not orange)
          const cellBorderCol=cellTier===1?'#ff6b00':cellTier===2?'#1565c0':'#555';
          const wedge=sectorWedge(c.lat,c.lon,az,bw,rKm*0.85);
          const poly=L.polygon(wedge,{
            color:cellBorderCol,
            fillColor:col,fillOpacity:0.45,weight:1.5,dashArray:'5,3'
          });
          const tierDisp=cellLabel?cellLabel.replace('1st','T1').replace('2nd','T2').replace('3rd','T3').replace('(upgraded)','↑').replace('(downgraded)','↓').replace('(shadowed)','~'):'';
          poly.bindTooltip(
            `${c.cellName}${tierDisp?' · '+tierDisp:''} · BCCH ${c.bcch!=null?c.bcch:'—'}`,
            {sticky:true,className:'lf-tip'}
          );
          poly.addTo(M); layers.current.push(poly);
        });

        // Site label for neighbour site
        const lpos=[nb.lat,nb.lon];
        const nlbl=L.marker(lpos,{icon:L.divIcon({
          html:`<div style="font-size:9px;color:#444;background:rgba(255,255,255,0.8);padding:1px 3px;border-radius:2px;white-space:nowrap;border:0.5px solid #aaa">${sn}</div>`,
          iconAnchor:[0,-2],className:''
        })});
        nlbl.addTo(M); layers.current.push(nlbl);
      });

      // Neighbour lines — tip of selected sector wedge → tip of neighbour sector wedge
      if(!isNaN(selLat)&&!isNaN(selLon)){
        const srcTip=destPoint(selLat,selLon,selSec.az,rKm);
        selSec.externalNeighbors.forEach(nb=>{
          if(isNaN(nb.lat)||isNaN(nb.lon)) return;
          const nbAz=parseFloat(nb.azimuth)||0;
          const nbTip=destPoint(nb.lat,nb.lon,nbAz,rKm*0.85);
          const t1=nb.tier===1;
          const ln=L.polyline([srcTip,nbTip],{
            color:t1?'#ff6b00':'#1565c0',weight:t1?2.5:1.5,
            dashArray:t1?null:'7,5',opacity:0.8
          });
          ln.bindTooltip(
            `<b>${nb.cellName}</b> · T${nb.tier} · ${nb.dist!=null?nb.dist.toFixed(1):'?'} km<br/>BCCH ${nb.bcch!=null?nb.bcch:'—'} · BSIC ${nb.ncc!=null?`${nb.ncc}/${nb.bcc}`:'—'}`,
            {sticky:true,className:'lf-tip'}
          );
          ln.addTo(M); layers.current.push(ln);
        });
      }
    }

    // Planned sector wedges
    results.forEach(({site,sectorResults},si)=>{
      const lat=parseFloat(site.lat),lon=parseFloat(site.lon);
      if(isNaN(lat)||isNaN(lon)) return;
      sectorResults.forEach((sec,ti)=>{
        const sel=si===activeSite&&ti===activeTab;
        const col=bcchToColor(sec.bcch);
        const wedge=sectorWedge(lat,lon,sec.az,bw,rKm);
        const poly=L.polygon(wedge,{
          color:sel?'#fff':col,fillColor:col,
          fillOpacity:sel?0.9:0.55,weight:sel?2.5:1.5
        });
        poly.bindPopup(
          `<div style="font-size:12px;line-height:1.6">
            <b style="font-size:13px">${site.name} · S${sec.idx+1}</b><br/>
            Az ${sec.az}° ${dirLabel(sec.az)}<br/>
            BCCH <b>${sec.bcch!=null?sec.bcch:'—'}</b>
            <span style="display:inline-block;width:10px;height:10px;background:${col};border-radius:2px;margin-left:4px;vertical-align:middle"></span><br/>
            TCH 900: ${sec.tch900List.length?sec.tch900List.join(', '):'—'}<br/>
            TCH 1800: ${sec.tch1800List.length?sec.tch1800List.join(', '):'—'}<br/>
            BSIC ${sec.bsic} (${sec.bsicDec})<br/>
            T1/T2/T3: ${sec.stats.tier1Count} / ${sec.stats.tier2Count} / ${sec.stats.tier3Count}
          </div>`,{maxWidth:220}
        );
        poly.on('click',()=>{setActiveSite(si);setActiveTab(ti);});
        poly.addTo(M); layers.current.push(poly);
      });
      // Site label
      const lbl=L.marker([lat,lon],{icon:L.divIcon({
        html:`<div style="font-size:10px;font-weight:600;color:#111;background:rgba(255,255,255,0.85);padding:1px 4px;border-radius:3px;white-space:nowrap;border:0.5px solid #ccc">${site.name}</div>`,
        iconAnchor:[0,-4],className:''
      })});
      lbl.addTo(M); layers.current.push(lbl);
    });

    // First open: fit all planned sites into view
    if(!initialFitDone.current){
      const pts=results.map(r=>[parseFloat(r.site.lat),parseFloat(r.site.lon)]).filter(p=>!isNaN(p[0])&&!isNaN(p[1]));
      if(pts.length>1) M.fitBounds(pts,{padding:[50,50]});
      else if(pts.length===1) M.setView(pts[0],13);
      initialFitDone.current=true;
    } else {
      // Sector selected: zoom to selected site + its neighbour sites
      const focusPts=[];
      if(!isNaN(selLat)&&!isNaN(selLon)) focusPts.push([selLat,selLon]);
      if(selSec) selSec.externalNeighbors.forEach(nb=>{
        if(!isNaN(nb.lat)&&!isNaN(nb.lon)) focusPts.push([nb.lat,nb.lon]);
      });
      if(focusPts.length>1) M.fitBounds(focusPts,{padding:[60,60],maxZoom:14});
      else if(focusPts.length===1) M.setView(focusPts[0],14);
    }

  },[results,activeSite,activeTab,visible,cfg,mapBW,mapLenKm,autoLen]);

  return (
    <div>
      {/* Map display controls */}
      <div style={{display:'flex',gap:'16px',alignItems:'center',flexWrap:'wrap',marginBottom:'8px',padding:'6px 10px',background:'var(--color-background-secondary)',borderRadius:'6px',border:'0.5px solid var(--color-border-tertiary)',fontSize:'12px'}}>
        <label style={{display:'flex',alignItems:'center',gap:'6px',color:'var(--color-text-secondary)'}}>
          Beam width
          <input type="number" min="5" max="120" value={mapBW}
            onChange={e=>setMapBW(Math.max(5,Math.min(120,+e.target.value||30)))}
            style={{width:'52px',padding:'2px 5px',border:'0.5px solid var(--color-border-secondary)',borderRadius:'4px',fontSize:'12px',textAlign:'center'}}/>
          °
        </label>
        <label style={{display:'flex',alignItems:'center',gap:'6px',color:'var(--color-text-secondary)'}}>
          Wedge length
          <input type="number" min="0.1" step="0.05"
            value={mapLenKm!==null?mapLenKm:''}
            placeholder={`${autoLen.toFixed(2)}`}
            onChange={e=>setMapLenKm(e.target.value===''?null:Math.max(0.1,+e.target.value))}
            style={{width:'70px',padding:'2px 5px',border:'0.5px solid var(--color-border-secondary)',borderRadius:'4px',fontSize:'12px',textAlign:'center'}}/>
          km
          {mapLenKm!==null&&
            <button onClick={()=>setMapLenKm(null)}
              style={{fontSize:'11px',padding:'1px 8px',cursor:'pointer',borderRadius:'4px',border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-secondary)'}}>
              auto
            </button>}
        </label>
        <span style={{color:'var(--color-text-tertiary)',fontSize:'11px'}}>auto = {autoLen.toFixed(2)} km</span>
      </div>
      <div ref={divRef} style={{height:'540px',width:'100%',borderRadius:'var(--border-radius-lg)',overflow:'hidden',border:'0.5px solid var(--color-border-tertiary)',background:'#e8e8e8'}}/>
      <div style={{display:'flex',gap:'20px',flexWrap:'wrap',marginTop:'10px',fontSize:'11px',color:'var(--color-text-tertiary)',alignItems:'center'}}>
        <span style={{display:'flex',alignItems:'center',gap:'5px'}}>
          <span style={{display:'inline-block',width:'22px',height:'3px',background:'#ff6b00'}}/> T1 neighbour
        </span>
        <span style={{display:'flex',alignItems:'center',gap:'5px'}}>
          <span style={{display:'inline-block',width:'22px',height:'0',borderTop:'2.5px dashed #1565c0'}}/> T2 neighbour
        </span>
        <span>Sector fill colour = BCCH (same colour = same BCCH)</span>
        <span>Grey dots = existing network · Click a sector wedge for details</span>
      </div>
    </div>
  );
}

function FreqPlanner() {
  const [step,setStep]=useState(1);
  const [gisData,setGisData]=useState(null);    const [gisMap,setGisMap]=useState({});
  const [paramData,setParamData]=useState(null); const [paramMap,setParamMap]=useState({});
  const [nsData,setNsData]=useState(null);       const [nsMap,setNsMap]=useState({});
  const [cells,setCells]=useState([]);
  const [plannedSites,setPlannedSites]=useState([]);
  const [cfg,setCfg]=useState({firstTierRadius:5,searchRadius:10,beamWidth:65,nccStr:"0-7",maxNeighbours:10,bsicRadius:50,maxPasses:3,bands:DEFAULT_BANDS});
  const [results,setResults]=useState(null);
  const [activeSite,setActiveSite]=useState(0);
  const [activeTab,setActiveTab]=useState(0);
  const [showMap,setShowMap]=useState(false);
  const [err,setErr]=useState("");

  const updBand=(i,k,v)=>setCfg(c=>({...c,bands:c.bands.map((b,j)=>j===i?{...b,[k]:v}:b)}));

  const onGisLoad=d=>{setGisData(d);setGisMap(detectGISCols(d.headers));};
  const onParamLoad=d=>{setParamData(d);setParamMap(detectParamCols(d.headers));};
  const onNsLoad=d=>{setNsData(d);setNsMap(detectNewSitesCols(d.headers));};

  const processAll=()=>{
    if(!gisData||!paramData||!nsData){setErr("Upload all three files first");return;}
    // Build parameter lookup
    const pLookup={};
    paramData.rows.forEach(row=>{
      const name=row[paramMap.cellName]?.trim();if(!name)return;
      let ncc=parseInt(row[paramMap.ncc]),bcc=parseInt(row[paramMap.bcc]);
      if(paramMap.bsic&&(isNaN(ncc)||isNaN(bcc))){const bs=parseInt(row[paramMap.bsic]);if(!isNaN(bs)){ncc=bs>>3;bcc=bs&7;}}
      const tchList=(row[paramMap.tch]||"").split(/[\s,;]+/).map(Number).filter(n=>!isNaN(n)&&n>0);
      const lac=paramMap.lac?parseInt(row[paramMap.lac]):NaN;
      const rac=paramMap.rac?parseInt(row[paramMap.rac]):NaN;
      const bsc=paramMap.bsc?row[paramMap.bsc]?.trim()||null:null;
      pLookup[name]={bcch:parseInt(row[paramMap.bcch])||null,tchList,ncc:isNaN(ncc)?null:ncc,bcc:isNaN(bcc)?null:bcc,lac:isNaN(lac)?null:lac,rac:isNaN(rac)?null:rac,bsc};
    });
    // Merge GIS + params
    const merged=gisData.rows.map(row=>{
      const cellName=row[gisMap.cellName]?.trim(),siteName=row[gisMap.siteName]?.trim();
      const lat=parseFloat(row[gisMap.lat]),lon=parseFloat(row[gisMap.lon]);
      const azimuth=parseFloat(row[gisMap.azimuth])||0;
      if(!cellName||isNaN(lat)||isNaN(lon))return null;
      return{cellName,siteName,lat,lon,azimuth,...(pLookup[cellName]||{})};
    }).filter(Boolean);
    if(!merged.length){setErr("No cells merged from GIS — check column mappings");return;}
    // Parse new sites
    const sites=buildPlannedSites(nsData.rows,nsMap);
    if(!sites.length){setErr("No valid rows in new sites CSV — check column mappings");return;}
    setCells(merged);
    setPlannedSites(sites);
    setErr("");setStep(2);
  };

  const runPlan=()=>{
    for(const s of plannedSites){
      if(isNaN(parseFloat(s.lat))||isNaN(parseFloat(s.lon))){setErr(`Invalid coords for ${s.name}`);return;}
    }
    const res=planAllSites(plannedSites,cells,cfg);
    setResults(res);setActiveSite(0);setActiveTab(0);setErr("");setStep(3);
  };

  const cur=results?.[activeSite];
  const sec=cur?.sectorResults?.[activeTab];

  return(
    <div style={{paddingTop:"8px"}}>
      <p style={{fontSize:"13px",color:"var(--color-text-secondary)",marginBottom:"20px",marginTop:"4px"}}>
        Upload existing network data + new sites → get BCCH, TCH, BSIC, LAC/RAC/BSC per sector.
      </p>
      <Steps current={step} onNav={setStep}/>
      {err&&<div style={{background:"var(--color-background-danger)",border:"0.5px solid var(--color-border-danger)",color:"var(--color-text-danger)",padding:"10px 14px",borderRadius:"var(--border-radius-md)",marginBottom:"16px",fontSize:"13px"}}>⚠ {err}</div>}

      {/* ── STEP 1: Upload all three files ── */}
      {step===1&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px"}}>
            {/* GIS */}
            <div>
              <FileBlock id="gis-f" title="GIS database" hint="Sites · cells · lat/lon · azimuth"
                note="CSV or XLSX. Must contain one row per cell/sector of the existing network."
                data={gisData} onLoad={onGisLoad}/>
              {gisData&&<div style={{...CARD,marginTop:"-4px"}}>
                <div style={{fontSize:"12px",fontWeight:"500",marginBottom:"6px"}}>Column mapping</div>
                <ColMapper headers={gisData.headers} mapping={gisMap} onChange={setGisMap}
                  fields={{siteName:"Site name",cellName:"Cell name *",lat:"Latitude *",lon:"Longitude *",azimuth:"Azimuth"}}/>
              </div>}
            </div>

            {/* Parameter dump */}
            <div>
              <FileBlock id="par-f" title="Nokia CMExport parameters"
                hint="2G.Summary.DDMMYY.xlsx · sheet: Cell Details"
                note='Opens directly from your CMExport folder. Auto-selects "Cell Details" sheet.'
                data={paramData} onLoad={onParamLoad} sheetHint="Cell Details"/>
              {paramData&&<div style={{...CARD,marginTop:"-4px"}}>
                <div style={{fontSize:"12px",fontWeight:"500",marginBottom:"6px"}}>Column mapping</div>
                <ColMapper headers={paramData.headers} mapping={paramMap} onChange={setParamMap}
                  fields={{cellName:"Cell name *",bcch:"BCCH *",tch:"TCH / MA list",ncc:"NCC",bcc:"BCC",bsic:"BSIC (alt)",lac:"LAC",rac:"RAC",bsc:"BSC"}}/>
              </div>}
            </div>

            {/* New sites */}
            <div>
              <FileBlock id="ns-f" title="New sites to plan"
                hint="One row per sector · Site Name, Lat, Lon, Azimuth, TRX_900, TRX_1800"
                note="Multiple rows with the same Site Name = multiple sectors of that site. TRX_900 = 0 means no 900 band for that cell."
                data={nsData} onLoad={onNsLoad}/>
              {nsData&&<div style={{...CARD,marginTop:"-4px"}}>
                <div style={{fontSize:"12px",fontWeight:"500",marginBottom:"6px"}}>Column mapping</div>
                <ColMapper headers={nsData.headers} mapping={nsMap} onChange={setNsMap}
                  fields={{siteName:"Site name *",siteId:"Site ID",lat:"Latitude *",lon:"Longitude *",azimuth:"Azimuth *",trx900:"TRX_900 *",trx1800:"TRX_1800 *"}}/>
                {/* Preview */}
                {nsData.rows.length>0&&nsMap.siteName&&(()=>{
                  const preview=buildPlannedSites(nsData.rows,nsMap);
                  return preview.length>0&&(
                    <div style={{marginTop:"10px",fontSize:"12px"}}>
                      <div style={{color:"var(--color-text-secondary)",marginBottom:"6px"}}>Parsed: {preview.length} site{preview.length>1?"s":""}, {preview.reduce((s,p)=>s+p.sectors.length,0)} sectors total</div>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"11px",fontFamily:"var(--font-mono)"}}>
                        <thead><tr style={{borderBottom:"0.5px solid var(--color-border-secondary)"}}>
                          {["Site","Sec","Az°","T900","T1800"].map(h=><th key={h} style={{padding:"3px 6px",color:"var(--color-text-tertiary)",fontWeight:"400",textAlign:"left"}}>{h}</th>)}
                        </tr></thead>
                        <tbody>
                          {preview.flatMap(p=>p.sectors.map((s,i)=>(
                            <tr key={`${p.name}-${i}`} style={{borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                              <td style={{padding:"3px 6px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"80px"}}>{i===0?p.name:""}</td>
                              <td style={{padding:"3px 6px",color:"var(--color-text-tertiary)"}}>S{i+1}</td>
                              <td style={{padding:"3px 6px"}}>{s.azimuth}°</td>
                              <td style={{padding:"3px 6px",color:s.trx900>0?"var(--color-text-warning)":"var(--color-text-tertiary)"}}>{s.trx900}</td>
                              <td style={{padding:"3px 6px",color:s.trx1800>0?"var(--color-text-info)":"var(--color-text-tertiary)"}}>{s.trx1800}</td>
                            </tr>
                          )))}
                        </tbody>
                      </table>
                    </div>
                  );
                })()}
              </div>}
            </div>
          </div>

          {gisData&&paramData&&nsData&&<button className="primary" style={{marginTop:"8px"}} onClick={processAll}>Process all files and continue →</button>}
        </div>
      )}

      {/* ── STEP 2: Algorithm + band config ── */}
      {step===2&&(
        <div>
          <div style={{fontSize:"12px",color:"var(--color-text-secondary)",marginBottom:"16px"}}>
            {cells.length.toLocaleString()} existing cells · {plannedSites.length} new site{plannedSites.length>1?"s":""} · {plannedSites.reduce((s,p)=>s+p.sectors.length,0)} sectors to plan
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"}}>
            <div style={CARD}>
              <div style={{fontSize:"13px",fontWeight:"500",marginBottom:"14px"}}>Algorithm parameters</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                <div>
                  <div style={FN}>Search radius (km)</div>
                  <input type="text" value={cfg.searchRadius}
                    onChange={e=>setCfg(c=>({...c,searchRadius:parseFloat(e.target.value)||5}))} style={MONO}/>
                  <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"2px"}}>Urban: 3–5 km · Rural: 8–15 km</div>
                </div>
                <div>
                  <div style={FN}>1st tier radius (km)</div>
                  <input type="text" value={cfg.firstTierRadius}
                    onChange={e=>setCfg(c=>({...c,firstTierRadius:parseFloat(e.target.value)||2}))} style={MONO}/>
                  <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"2px"}}>Strict no-same-BCCH zone</div>
                </div>
                <div>
                  <div style={FN}>BSIC uniqueness radius (km)</div>
                  <input type="text" value={cfg.bsicRadius}
                    onChange={e=>setCfg(c=>({...c,bsicRadius:parseFloat(e.target.value)||50}))} style={MONO}/>
                  <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"2px"}}>BSIC+BCCH combo unique within this distance; retries at 80% steps</div>
                </div>
                <div>
                  <div style={FN}>Beam width (°)</div>
                  <input type="text" value={cfg.beamWidth}
                    onChange={e=>setCfg(c=>({...c,beamWidth:parseFloat(e.target.value)||130}))} style={MONO}/>
                </div>
                <div>
                  <div style={FN}>NCC pool</div>
                  <input type="text" value={cfg.nccStr}
                    onChange={e=>setCfg(c=>({...c,nccStr:e.target.value}))} style={MONO}/>
                  <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"2px"}}>e.g. 0-7 or 2,4,6</div>
                </div>
                <div style={{gridColumn:"1/-1"}}>
                  <div style={FN}>Max external neighbours per sector</div>
                  <input type="text" value={cfg.maxNeighbours}
                    onChange={e=>setCfg(c=>({...c,maxNeighbours:parseInt(e.target.value)||10}))} style={{...MONO,width:"100px"}}/>
                  <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"2px"}}>Beyond 1st-tier, only cells with beam overlap are counted toward this limit</div>
                </div>
                <div style={{gridColumn:"1/-1"}}>
                  <div style={FN}>Planning passes (multi-pass refinement)</div>
                  <input type="text" value={cfg.maxPasses}
                    onChange={e=>setCfg(c=>({...c,maxPasses:Math.max(1,parseInt(e.target.value)||3)}))} style={{...MONO,width:"100px"}}/>
                  <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"2px"}}>Pass 1 is sequential greedy; passes 2+ re-plan each site using all other sites' previous-pass frequencies. Higher = better quality, slower.</div>
                </div>
              </div>
            </div>

            <div style={CARD}>
              <div style={{fontSize:"13px",fontWeight:"500",marginBottom:"4px"}}>Band ARFCN pools</div>
              <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"12px"}}>
                Band 1 = 900 (BCCH + TCH). Band 2 = 1800 (TCH only for dual-band cells). Ranges: 76-87, lists: 88-101, 123, 124.
              </div>
              {cfg.bands.map((bd,i)=>{
                const bp=getBcchPool(bd),tp=getTchPool(bd);
                return(
                  <div key={bd.id} style={{marginBottom:"14px",paddingBottom:"14px",borderBottom:i<cfg.bands.length-1?"0.5px solid var(--color-border-tertiary)":"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
                      <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",minWidth:"50px"}}>Band {i+1}</div>
                      <input value={bd.name} onChange={e=>updBand(i,"name",e.target.value)} style={{...MONO,fontWeight:"500",width:"110px"}}/>
                      <span style={{fontSize:"11px",color:"var(--color-text-tertiary)"}}>{bp.length} BCCH · {tp.length} TCH</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                      <div>
                        <div style={FN}>BCCH ARFCNs</div>
                        <input value={bd.bcchStr} onChange={e=>updBand(i,"bcchStr",e.target.value)} style={{...MONO,width:"100%"}} placeholder="e.g. 76-87"/>
                        {bp.length>0&&<div style={{fontSize:"11px",color:"var(--color-text-success)",marginTop:"2px"}}>→ {arfcnListToStr(bp)} ({bp.length})</div>}
                      </div>
                      <div>
                        <div style={FN}>TCH ARFCNs</div>
                        <input value={bd.tchStr} onChange={e=>updBand(i,"tchStr",e.target.value)} style={{...MONO,width:"100%"}} placeholder="e.g. 88-101, 123, 124"/>
                        {tp.length>0&&<div style={{fontSize:"11px",color:"var(--color-text-success)",marginTop:"2px"}}>→ {arfcnListToStr(tp)} ({tp.length})</div>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{fontSize:"12px",color:"var(--color-text-secondary)",background:"var(--color-background-secondary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"10px 14px",marginBottom:"12px"}}>
            TCH count is derived per sector from your CSV: <strong>900 TCH = TRX_900 − 1</strong> (one TRX carries BCCH) · <strong>1800 TCH = TRX_1800</strong> (all TCH, BCCH stays on 900). For 1800-only cells: BCCH on 1800, TCH = TRX_1800 − 1.
            Sites are planned in CSV order — each site's assignment is locked before the next one starts.
          </div>

          <div style={{display:"flex",gap:"10px"}}>
            <button onClick={()=>setStep(1)}>← Back</button>
            <button className="primary" onClick={runPlan}>Plan {plannedSites.length} site{plannedSites.length>1?"s":""} →</button>
          </div>
        </div>
      )}

      {/* ── STEP 3: Results ── */}
      {step===3&&results&&(
        <div>
          <div style={{display:"flex",alignItems:"center",marginBottom:"16px"}}>
            <div style={{fontSize:"15px",fontWeight:"500"}}>{results.length} site{results.length>1?"s":""} planned</div>
            <div style={{marginLeft:"auto",display:"flex",gap:"8px"}}>
              <button onClick={()=>setStep(2)}>← Reconfigure</button>
              <button onClick={()=>setShowMap(m=>!m)} style={{fontFamily:"var(--font-mono)",fontSize:"12px"}}>
                {showMap?'📋 Details':'🗺 Map'}
              </button>
              <button className="primary" onClick={()=>exportAll(results)}>Export XLSX ↗</button>
            </div>
          </div>

          {/* Map view */}
          <div style={{display:showMap?'block':'none',marginBottom:'16px'}}>
            <PlanMap results={results} cells={cells} activeSite={activeSite} setActiveSite={setActiveSite}
              activeTab={activeTab} setActiveTab={setActiveTab} cfg={cfg} visible={showMap}/>
          </div>

          {/* Site selector */}
          <div style={{display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap"}}>
            {results.map(({site},i)=>(
              <button key={i} onClick={()=>{setActiveSite(i);setActiveTab(0);}}
                style={{fontSize:"12px",fontWeight:activeSite===i?"500":"400",fontFamily:"var(--font-mono)",padding:"6px 14px",borderRadius:"var(--border-radius-md)",
                  background:activeSite===i?"var(--color-background-info)":"var(--color-background-secondary)",
                  color:activeSite===i?"var(--color-text-info)":"var(--color-text-secondary)",
                  border:`0.5px solid ${activeSite===i?"var(--color-border-info)":"var(--color-border-tertiary)"}`}}>
                {site.name}
              </button>
            ))}
          </div>

          {cur&&(
            <>
              {/* Site summary table */}
              <div style={{...CARD,marginBottom:"16px"}}>
                <div style={{display:"flex",alignItems:"center",marginBottom:"10px"}}>
                  <span style={{fontSize:"13px",fontWeight:"500"}}>{cur.site.name}</span>
                  {activeSite>0&&<span style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginLeft:"10px"}}>planned after {activeSite} prior site{activeSite>1?"s":""} — their freqs locked</span>}
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",fontFamily:"var(--font-mono)"}}>
                    <thead><tr style={{borderBottom:"0.5px solid var(--color-border-secondary)"}}>
                      {["Sec","Az","T900/T1800","BCCH","BCCH","900 TCH","","1800 TCH","","BSIC","Dec","BSIC sep"].map((h,i)=>(
                        <th key={i} style={{padding:"5px 8px",color:"var(--color-text-tertiary)",fontWeight:"400",textAlign:"left",fontSize:"11px",whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {cur.sectorResults.map((r,i)=>(
                        <tr key={i} onClick={()=>setActiveTab(i)}
                          style={{borderBottom:"0.5px solid var(--color-border-tertiary)",cursor:"pointer",background:activeTab===i?"var(--color-background-secondary)":"transparent"}}>
                          <td style={{padding:"5px 8px",fontWeight:"500"}}>S{r.idx+1}</td>
                          <td style={{padding:"5px 8px"}}>{r.az}° {dirLabel(r.az)}</td>
                          <td style={{padding:"5px 8px",color:"var(--color-text-tertiary)"}}>{r.trx900}/{r.trx1800}</td>
                          <td style={{padding:"5px 8px",fontWeight:"500",color:"var(--color-text-warning)"}}>{r.bcch||"—"}</td>
                          <td style={{padding:"5px 8px"}}><ModeBadge mode={r.bcchMode}/></td>
                          <td style={{padding:"5px 8px",color:"var(--color-text-secondary)",fontFamily:"var(--font-mono)",fontSize:"11px"}}>{r.tch900List.length?r.tch900List.join(" "):"—"}</td>
                          <td style={{padding:"5px 8px"}}>{r.tch900Count>0&&<ModeBadge mode={r.tch900Mode}/>}</td>
                          <td style={{padding:"5px 8px",color:"var(--color-text-secondary)",fontFamily:"var(--font-mono)",fontSize:"11px"}}>{r.tch1800List.length?r.tch1800List.join(" "):"—"}</td>
                          <td style={{padding:"5px 8px"}}>{r.tch1800Count>0&&<ModeBadge mode={r.tch1800Mode}/>}</td>
                          <td style={{padding:"5px 8px",color:"var(--color-text-info)"}}>{r.bsic}</td>
                          <td style={{padding:"5px 8px",color:"var(--color-text-tertiary)"}}>{r.bsicDec??'—'}</td>
                          <td style={{padding:"5px 8px",color:r.bsicRepeatDist!=null&&r.bsicRepeatDist<10?"var(--color-text-warning)":"var(--color-text-tertiary)",whiteSpace:"nowrap"}}>
                            {r.bsicRepeatDist!=null?`${r.bsicRepeatDist.toFixed(1)} km`:"∞"}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"6px"}}>Click a row for neighbour detail below.</div>
              </div>

              {/* Sector detail */}
              {sec&&(
                <div>
                  <div style={{fontSize:"13px",fontWeight:"500",marginBottom:"12px"}}>
                    {cur.site.name} · S{sec.idx+1} — {sec.az}° {dirLabel(sec.az)}
                    <span style={{fontWeight:"400",color:"var(--color-text-tertiary)",marginLeft:"10px",fontSize:"12px"}}>
                      {sec.trx900} TRX on 900 + {sec.trx1800} TRX on 1800
                      {sec.has900&&sec.has1800&&<> · dual-band, BCCH on 900</>}
                      {sec.has900&&!sec.has1800&&<> · 900-only</>}
                      {!sec.has900&&sec.has1800&&<> · 1800-only, BCCH on 1800</>}
                    </span>
                  </div>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"16px"}}>
                    {/* BCCH */}
                    <div style={CARD}>
                      <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>BCCH ({sec.bcchBandName})</div>
                      <div style={{fontFamily:"var(--font-mono)",fontSize:"26px",fontWeight:"500",color:"var(--color-text-warning)",marginBottom:"6px"}}>{sec.bcch||"—"}</div>
                      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}><ModeBadge mode={sec.bcchMode}/></div>
                      {(sec.bcchMode==="t1_reuse"||sec.bcchMode==="t2_reuse")&&<div style={{fontSize:"11px",color:"var(--color-text-warning)",background:"var(--color-background-warning)",border:"0.5px solid var(--color-border-warning)",borderRadius:"4px",padding:"5px 8px",marginBottom:"8px"}}>
                        {sec.bcchMode==="t1_reuse"?"T1":"T2"} BCCH reuse. Differentiated by BSIC {sec.bsic}.
                      </div>}
                      <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"3px"}}>T1 BCCHs: {(sec.tier1BCCHs||[]).map(b=><Pill key={b} n={b} type={b===sec.bcch?"warn":"default"}/>)||"—"}</div>
                      <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"6px",marginBottom:"3px"}}>All neighbour BCCHs:</div>
                      <div>{sec.allNbBCCHs.slice(0,20).map(b=><Pill key={b} n={b} type={b===sec.bcch?"danger":"default"}/>)}{sec.allNbBCCHs.length>20&&<span style={{fontSize:"11px",color:"var(--color-text-tertiary)"}}> +{sec.allNbBCCHs.length-20}</span>}</div>
                    </div>

                    {/* TCH 900 */}
                    <div style={CARD}>
                      <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>
                        900 MHz TCH ({sec.tch900Count} freq needed)
                      </div>
                      {sec.tch900Count===0
                        ?<div style={{fontSize:"12px",color:"var(--color-text-tertiary)"}}>No 900 TCH — BCCH TRX only</div>
                        :<>
                          <div style={{marginBottom:"8px"}}>{sec.tch900List.length?sec.tch900List.map(t=><Pill key={t} n={t} type="warn"/>):<span style={{fontSize:"12px",color:"var(--color-text-tertiary)"}}>—</span>}</div>
                          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}><ModeBadge mode={sec.tch900Mode}/></div>
                          <div style={{fontSize:"12px",color:"var(--color-text-secondary)"}}>{sec.tch900List.length} assigned{sec.tch900List.length>1?` · span ${Math.max(...sec.tch900List)-Math.min(...sec.tch900List)} ch`:""}</div>
                        </>
                      }
                    </div>

                    {/* TCH 1800 + BSIC */}
                    <div>
                      <div style={{...CARD,marginBottom:"10px"}}>
                        <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>
                          1800 MHz TCH ({sec.tch1800Count} freq needed)
                        </div>
                        {sec.tch1800Count===0
                          ?<div style={{fontSize:"12px",color:"var(--color-text-tertiary)"}}>No 1800 band on this cell</div>
                          :<>
                            <div style={{marginBottom:"8px"}}>{sec.tch1800List.length?sec.tch1800List.map(t=><Pill key={t} n={t} type="info"/>):<span style={{fontSize:"12px",color:"var(--color-text-tertiary)"}}>—</span>}</div>
                            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}><ModeBadge mode={sec.tch1800Mode}/></div>
                            <div style={{fontSize:"12px",color:"var(--color-text-secondary)"}}>{sec.tch1800List.length} assigned{sec.tch1800List.length>1?` · span ${Math.max(...sec.tch1800List)-Math.min(...sec.tch1800List)} ch`:""}</div>
                          </>
                        }
                      </div>
                      <div style={{...CARD,marginBottom:0}}>
                        <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>BSIC</div>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:"22px",fontWeight:"500",color:"var(--color-text-info)",marginBottom:"4px"}}>{sec.bsic}</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginTop:"6px"}}>
                          {[["NCC",sec.ncc],["BCC",sec.bcc]].map(([l,v])=>(
                            <div key={l} style={{background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"8px",textAlign:"center"}}>
                              <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"3px"}}>{l}</div>
                              <div style={{fontFamily:"var(--font-mono)",fontSize:"18px",fontWeight:"500",color:"var(--color-text-info)"}}>{v}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{marginTop:"10px",background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"8px 10px"}}>
                          <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"3px"}}>Min BSIC+BCCH repeat dist</div>
                          <div style={{fontFamily:"var(--font-mono)",fontSize:"15px",fontWeight:"500",
                            color:sec.bsicRepeatDist!=null&&sec.bsicRepeatDist<10?"var(--color-text-warning)":"var(--color-text-info)"}}>
                            {sec.bsicRepeatDist!=null?`${sec.bsicRepeatDist.toFixed(1)} km`:"∞ unique"}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Neighbour list */}
                  <div style={CARD}>
                    <div style={{fontSize:"13px",fontWeight:"500",marginBottom:"14px"}}>Neighbour cell list</div>

                    <div style={{fontSize:"11px",fontWeight:"500",color:"var(--color-text-tertiary)",letterSpacing:"0.5px",marginBottom:"6px",textTransform:"uppercase"}}>Intra-site</div>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",fontFamily:"var(--font-mono)",marginBottom:"16px"}}>
                      <thead><tr style={{borderBottom:"0.5px solid var(--color-border-secondary)"}}>
                        {["Cell","Az","BCCH","900 TCH","1800 TCH","BSIC"].map(h=><th key={h} style={{padding:"4px 8px",color:"var(--color-text-tertiary)",fontWeight:"400",textAlign:"left",fontSize:"11px"}}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {/* Other sectors of same site */}
                        {cur.sectorResults.filter(s=>s.idx!==sec.idx).map(s=>(
                          <tr key={s.idx} style={{borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                            <td style={{padding:"4px 8px",fontWeight:"500"}}>{cur.site.name}_S{s.idx+1}</td>
                            <td style={{padding:"4px 8px"}}>{s.az}° {dirLabel(s.az)}</td>
                            <td style={{padding:"4px 8px",color:"var(--color-text-warning)"}}>{s.bcch}</td>
                            <td style={{padding:"4px 8px",color:"var(--color-text-secondary)",fontSize:"11px"}}>{s.tch900List.join(" ")||"—"}</td>
                            <td style={{padding:"4px 8px",color:"var(--color-text-secondary)",fontSize:"11px"}}>{s.tch1800List.join(" ")||"—"}</td>
                            <td style={{padding:"4px 8px",color:"var(--color-text-info)"}}>{s.bsic}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>

                    <div style={{fontSize:"11px",fontWeight:"500",color:"var(--color-text-tertiary)",letterSpacing:"0.5px",marginBottom:"4px",textTransform:"uppercase"}}>
                      External {sec.externalNeighbors.length} shown · T1: {sec.stats.tier1Count}{sec.stats.upgradedCount>0?` (${sec.stats.upgradedCount}↑)`:""} · T2: {sec.stats.tier2Count}{sec.stats.demotedCount>0||sec.stats.shadowedCount>0?` (${(sec.stats.demotedCount||0)+(sec.stats.shadowedCount||0)} adj)`:""} · {sec.stats.total} in search range
                    </div>
                    <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginBottom:"8px",display:"flex",gap:"12px",flexWrap:"wrap"}}>
                      <span><span style={{background:"var(--color-background-warning)",color:"var(--color-text-warning)",border:"0.5px solid var(--color-border-warning)",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"500"}}>T1</span> Direct beam overlap — mandatory neighbours</span>
                      <span><span style={{background:"#e6f9ee",color:"#1a7f45",border:"0.5px solid #7ac599",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"500"}}>T1↑</span> Upgraded: both overlaps &gt;60%</span>
                      <span><span style={{background:"var(--color-background-info)",color:"var(--color-text-info)",border:"0.5px solid var(--color-border-info)",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"500"}}>T2</span> One handover hop away</span>
                      <span><span style={{background:"#f0f4ff",color:"#6366f1",border:"0.5px solid #a5b4fc",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"500"}}>T2↓</span> Downgraded: one-sided overlap &lt;45%</span>
                      <span><span style={{background:"#fff8e1",color:"#b45309",border:"0.5px solid #f0b429",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",fontWeight:"500"}}>T2~</span> Shadowed: closer T1 already covers this direction</span>
                    </div>
                    {sec.externalNeighbors.length===0
                      ?<div style={{fontSize:"12px",color:"var(--color-text-tertiary)"}}>No external neighbours in range.</div>
                      :<div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",fontFamily:"var(--font-mono)",tableLayout:"fixed"}}>
                          <thead><tr style={{borderBottom:"0.5px solid var(--color-border-secondary)"}}>
                            {["#","Cell","Site","km","Az","Bear","→ ovlp","← ovlp","BCCH","BSIC"].map((h,i)=>(
                              <th key={h} style={{padding:"5px 8px",color:"var(--color-text-tertiary)",fontWeight:"400",textAlign:"left",fontSize:"11px",
                                width:["36px","120px","100px","52px","50px","50px","68px","68px","50px","50px"][i]}}>{h}</th>
                            ))}
                          </tr></thead>
                          <tbody>
                            {sec.externalNeighbors.map((nb,i)=>(
                              <tr key={i} style={{borderBottom:"0.5px solid var(--color-border-tertiary)",background:i%2?"transparent":"var(--color-background-secondary)"}}>
                                <td style={{padding:"5px 8px"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                                    <span style={{color:"var(--color-text-tertiary)",fontSize:"11px",minWidth:"14px"}}>{i+1}</span>
                                    {nb.tier===1&&!nb.tierLabel?.includes('upgraded')&&<span style={{background:"var(--color-background-warning)",color:"var(--color-text-warning)",border:"0.5px solid var(--color-border-warning)",borderRadius:"3px",padding:"1px 4px",fontSize:"9px",fontWeight:"500",lineHeight:"1.4"}}>T1</span>}
                                    {nb.tierLabel==='1st(upgraded)'&&<span title="Upgraded: strong bilateral overlap" style={{background:"#e6f9ee",color:"#1a7f45",border:"0.5px solid #7ac599",borderRadius:"3px",padding:"1px 4px",fontSize:"9px",fontWeight:"500",lineHeight:"1.4"}}>T1↑</span>}
                                    {nb.tier===2&&nb.tierLabel==='2nd'&&<span style={{background:"var(--color-background-info)",color:"var(--color-text-info)",border:"0.5px solid var(--color-border-info)",borderRadius:"3px",padding:"1px 4px",fontSize:"9px",fontWeight:"500",lineHeight:"1.4"}}>T2</span>}
                                    {nb.tierLabel==='2nd(downgraded)'&&<span title="Downgraded: one-sided overlap too weak" style={{background:"#f0f4ff",color:"#6366f1",border:"0.5px solid #a5b4fc",borderRadius:"3px",padding:"1px 4px",fontSize:"9px",fontWeight:"500",lineHeight:"1.4"}}>T2↓</span>}
                                    {nb.tierLabel==='2nd(shadowed)'&&<span title="Shadowed: a closer T1 cell already covers this direction" style={{background:"#fff8e1",color:"#b45309",border:"0.5px solid #f0b429",borderRadius:"3px",padding:"1px 4px",fontSize:"9px",fontWeight:"500",lineHeight:"1.4"}}>T2~</span>}
                                  </div>
                                </td>
                                <td style={{padding:"5px 8px",fontWeight:"500",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:nb.isPlanned?"var(--color-text-info)":"var(--color-text-primary)"}}>{nb.cellName}{nb.isPlanned?" ★":""}</td>
                                <td style={{padding:"5px 8px",color:"var(--color-text-secondary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nb.siteName||"—"}</td>
                                <td style={{padding:"5px 8px",color:"var(--color-text-warning)"}}>{Number(nb.dist).toFixed(2)}</td>
                                <td style={{padding:"5px 8px",color:"var(--color-text-secondary)"}}>{nb.azimuth}°</td>
                                <td style={{padding:"5px 8px",color:"var(--color-text-secondary)"}}>{Number(nb.bear).toFixed(0)}°</td>
                                <td style={{padding:"5px 8px"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:"3px"}}>
                                    <div style={{flex:1,height:"5px",background:"var(--color-background-secondary)",borderRadius:"2px"}}>
                                      <div style={{width:`${Math.round(nb.fwdS*100)}%`,height:"5px",background:"var(--color-background-warning)",borderRadius:"2px"}}/>
                                    </div>
                                    <span style={{fontSize:"10px",color:"var(--color-text-tertiary)",minWidth:"22px"}}>{Math.round(nb.fwdS*100)}%</span>
                                  </div>
                                </td>
                                <td style={{padding:"5px 8px"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:"3px"}}>
                                    <div style={{flex:1,height:"5px",background:"var(--color-background-secondary)",borderRadius:"2px"}}>
                                      <div style={{width:`${Math.round(nb.revS*100)}%`,height:"5px",background:"var(--color-background-info)",borderRadius:"2px"}}/>
                                    </div>
                                    <span style={{fontSize:"10px",color:"var(--color-text-tertiary)",minWidth:"22px"}}>{Math.round(nb.revS*100)}%</span>
                                  </div>
                                </td>
                                <td style={{padding:"5px 8px",color:nb.bcch===sec.bcch?"var(--color-text-danger)":"var(--color-text-primary)",fontWeight:nb.bcch===sec.bcch?"500":"400"}}>{nb.bcch||"—"}</td>
                                <td style={{padding:"5px 8px",color:"var(--color-text-secondary)"}}>{nb.ncc!=null&&nb.bcc!=null?`${nb.ncc}/${nb.bcc}`:"—"}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"6px"}}>★ = other planned site in this batch</div>
                      </div>
                    }
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<FreqPlanner />);
  </script>
</body>
</html>
