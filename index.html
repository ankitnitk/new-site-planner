  <script type="text/babel">
const { useState, useRef } = React;

// ── Geo math ──────────────────────────────────────────────────────────────────
const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;
const haversineKm = (a,b,c,d) => {
  const R=6371,dLat=toRad(c-a),dLon=toRad(d-b);
  const x=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
};
const compassBearing = (la1,lo1,la2,lo2) => {
  const dL=toRad(lo2-lo1),y=Math.sin(dL)*Math.cos(toRad(la2));
  const x=Math.cos(toRad(la1))*Math.sin(toRad(la2))-Math.sin(toRad(la1))*Math.cos(toRad(la2))*Math.cos(dL);
  return (toDeg(Math.atan2(y,x))+360)%360;
};
const angleDiff = (a,b) => Math.min(Math.abs(((a-b+180+360)%360)-180),180);
const DIR=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
const dirLabel = az => DIR[Math.round(az/22.5)%16];
let _uid=0; const uid = ()=>++_uid;

// ── File reading ──────────────────────────────────────────────────────────────
const readBuf = file => new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsArrayBuffer(file); });

async function parseFile(file, preferredSheet) {
  const buf = await readBuf(file);
  const ext = file.name.split(".").pop().toLowerCase();
  if (ext==="csv"||ext==="txt") return parseCSVText(new TextDecoder().decode(buf));
  const wb = XLSX.read(buf,{type:"array",cellDates:true});
  const sn = pickSheet(wb.SheetNames,preferredSheet);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:"",raw:false});
  const headers = json.length?Object.keys(json[0]):[];
  const rows = json.map(row=>{const o={};Object.entries(row).forEach(([k,v])=>{o[k]=String(v).trim();});return o;});
  return {headers,rows,sheetName:sn,allSheets:wb.SheetNames};
}

function pickSheet(names,preferred) {
  if (preferred) { const c=names.find(n=>n.toLowerCase()===preferred.toLowerCase()); if(c) return c; const p=names.find(n=>n.toLowerCase().includes(preferred.toLowerCase())); if(p) return p; }
  const norm=s=>s.toLowerCase().replace(/\s/g,"");
  return names.find(n=>norm(n)==="celldetails")||names.find(n=>norm(n).includes("cell")&&norm(n).includes("detail"))||names.find(n=>norm(n).includes("cell"))||names[0];
}

function parseCSVText(text) {
  const clean=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim();
  const first=clean.split("\n")[0];
  const sep=first.split(";").length>first.split(",").length?";":",";
  const split=line=>{ if(sep===";") return line.split(";").map(v=>v.trim().replace(/^"|"$/g,""));
    const v=[]; let q=false,c=""; for(const ch of line){if(ch==='"'){q=!q;continue;}if(ch===","&&!q){v.push(c.trim());c="";continue;}c+=ch;} v.push(c.trim()); return v; };
  const lines=clean.split("\n"); const headers=split(lines[0]);
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const v=split(l);const o={};headers.forEach((h,i)=>{o[h]=(v[i]||"").trim();});return o;});
  return {headers,rows,sheetName:null,allSheets:[]};
}

// ── Column detection ──────────────────────────────────────────────────────────
const norm = s => s.toLowerCase().replace(/[\s_\-\.]/g,"");
const findCol = (headers,pats) => { const h=headers.map(norm); for(const p of pats){const i=h.findIndex(x=>x.includes(norm(p)));if(i>=0)return headers[i];} return ""; };

const detectGISCols = h => ({
  siteName: findCol(h,["sitename","siteid","site_name","site","btsname"]),
  cellName: findCol(h,["cellname","cellid","cell_name","cell","bscell","bts"]),
  lat:      findCol(h,["lat","latitude","y_coord","ylat"]),
  lon:      findCol(h,["lon","lng","longitude","x_coord","xlon"]),
  azimuth:  findCol(h,["azimuth","bearing","direction","az","beam"]),
});
const detectParamCols = h => ({
  cellName: findCol(h,["cellname","bscell","cell_name","cellid","cell","bts"]),
  bcch:     findCol(h,["bcch","bccharfcn","bcch_arfcn","bcchan","arfcn"]),
  tch:      findCol(h,["malist","ma_list","tchlist","frequencyhoppingarfcns","hopfreq","tchfreq","tch","freqlist"]),
  ncc:      findCol(h,["ncc","networkcolour","networkcolor"]),
  bcc:      findCol(h,["bcc","basecolour","basecolor"]),
  bsic:     findCol(h,["bsic","basestationidentity"]),
  lac:      findCol(h,["lac","locationareacode","location_area","locationarea"]),
  rac:      findCol(h,["rac","routingareacode","routing_area","routingarea"]),
  bsc:      findCol(h,["bsc","bscname","bsc_name","bscid","bsc_id","btscontroller"]),
});
const detectNewSitesCols = h => ({
  siteName: findCol(h,["sitename","site_name","name","site"]),
  siteId:   findCol(h,["siteid","site_id","id"]),
  lat:      findCol(h,["lat","latitude","y_coord","ylat","y"]),
  lon:      findCol(h,["lon","lng","longitude","x_coord","xlon","x"]),
  azimuth:  findCol(h,["azimuth","bearing","az","direction"]),
  trx900:   findCol(h,["trx900","trx_900","900trx","trx9","900"]),
  trx1800:  findCol(h,["trx1800","trx_1800","1800trx","trx18","1800"]),
});

// ── Utilities ────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── ARFCN pool helpers ────────────────────────────────────────────────────────
function parseARFCNList(str) {
  if (!str||!str.trim()) return [];
  const result=new Set();
  for(const tok of String(str).trim().split(/[\s,;]+/)){
    const rng=tok.match(/^(\d+)\s*(?:-|\.\.)\s*(\d+)$/);
    if(rng){const lo=Math.min(+rng[1],+rng[2]),hi=Math.max(+rng[1],+rng[2]);for(let a=lo;a<=hi;a++)result.add(a);}
    else{const n=parseInt(tok,10);if(!isNaN(n))result.add(n);}
  }
  return [...result].sort((a,b)=>a-b);
}
function arfcnListToStr(arr) {
  if(!arr.length) return ""; const p=[]; let lo=arr[0],hi=arr[0];
  for(let i=1;i<=arr.length;i++){if(arr[i]===hi+1){hi=arr[i];continue;}p.push(lo===hi?`${lo}`:`${lo}-${hi}`);lo=hi=arr[i];}
  return p.join(", ");
}
const getBcchPool = bd => parseARFCNList(bd?.bcchStr||"");
const getTchPool  = bd => parseARFCNList(bd?.tchStr||"");

// ── New sites CSV → planned sites ─────────────────────────────────────────────
function buildPlannedSites(rows, m) {
  const siteMap=new Map();
  rows.forEach(row=>{
    const name=(row[m.siteName]||"").trim(); if(!name) return;
    const lat=parseFloat(row[m.lat]),lon=parseFloat(row[m.lon]);
    if(isNaN(lat)||isNaN(lon)) return;
    const az=parseFloat(row[m.azimuth])||0;
    const trx900=parseInt(row[m.trx900])||0;
    const trx1800=parseInt(row[m.trx1800])||0;
    const siteId=(m.siteId&&row[m.siteId]?.trim())||name;
    if(!siteMap.has(name)) siteMap.set(name,{id:uid(),name,siteId,lat,lon,sectors:[]});
    siteMap.get(name).sectors.push({azimuth:az,trx900,trx1800});
  });
  return [...siteMap.values()];
}

// ── Optimal TCH selection ─────────────────────────────────────────────────────
// Tries all C(pool,count) combinations and picks the one that maximises the
// minimum distance to any sibling-sector TCH already in siteRegTCH.
// Tie-break: maximise internal spread (good for intra-sector ACI).
// Falls back to spreadSelect when the combination space is too large.
function optimalTCHSelect(pool, count, minSep, siteRegTCH) {
  const sorted = [...new Set(pool)].sort((a,b)=>a-b);
  if (!sorted.length || !count) return [];

  // Combinatorial size guard: C(n,k) — avoid n choose k > 60000
  let cn=1; for(let i=0;i<count;i++) cn=cn*(sorted.length-i)/(i+1);
  if (cn > 60000) return spreadSelect(pool, count, minSep);

  // Objective: cluster this sector's TCHs AS CLOSE AS POSSIBLE to sibling sectors' already-committed
  // TCHs (while still respecting the pool's exclusion rules). This leaves the far end of the pool
  // free for subsequent allocations, maximising contiguous free space globally.
  // When no siblings exist yet (siteRegTCH empty), minimise internal spread — keeps the cluster tight.
  // Among ALL combinations that tie on (dist, spread), one is chosen randomly to avoid systematic
  // low-ARFCN bias (the sorted search order would otherwise always favour the lowest-valued cluster).
  let bestCombos=[], bestDist=Infinity, bestSpread=Infinity;

  function search(start, sel) {
    if (sel.length === count) {
      const dist = siteRegTCH.length === 0 ? 0
        : Math.min(...sel.flatMap(s => siteRegTCH.map(r => Math.abs(s-r))));
      const spread = sel[sel.length-1] - sel[0];
      if (dist < bestDist || (dist === bestDist && spread < bestSpread)) {
        bestDist=dist; bestSpread=spread; bestCombos=[[...sel]];
      } else if (dist === bestDist && spread === bestSpread && bestCombos.length < 200) {
        bestCombos.push([...sel]); // collect ties for random selection below
      }
      return;
    }
    if (sorted.length - start < count - sel.length) return; // prune
    for (let i=start; i<sorted.length; i++) {
      if (sel.length>0 && sorted[i]-sel[sel.length-1] < minSep) continue;
      search(i+1, [...sel, sorted[i]]);
    }
  }
  search(0, []);
  if (!bestCombos.length) return [];
  return bestCombos[Math.floor(Math.random() * bestCombos.length)];
}

// ── Spread selection ──────────────────────────────────────────────────────────
function spreadSelect(pool, count, minSep=1) {
  // minSep=1 means no two selected freqs can be identical (normal)
  // minSep=2 means no two selected freqs can be adjacent (strict intra-sector rule)
  if (!pool.length) return [];
  const eligible = (a, sel) => !sel.includes(a) && sel.every(s => Math.abs(a-s) >= minSep);
  const midStart = pool[Math.floor(pool.length/2)];
  const firstEligible = pool.find(a => eligible(a, [])) ?? pool[0];
  const sel = [firstEligible];
  while (sel.length < count) {
    let best=null, bd=-1;
    for (const a of pool) {
      if (!eligible(a, sel)) continue;
      const d = Math.min(...sel.map(s=>Math.abs(a-s)));
      if (d>bd) { bd=d; best=a; }
    }
    if (best!==null) sel.push(best); else break;
  }
  return sel.sort((a,b)=>a-b);
}

// ── TCH planner (shared for 900 and 1800) ────────────────────────────────────
function planTCH(tchPool, scored, inSiteBCCHSet, siteRegTCH, count) {
  // siteRegTCH = TCHs already assigned to OTHER sectors of this site (not this sector)
  if (!count || !tchPool.length) return {list:[], mode:"n/a"};
  tchPool = shuffle(tchPool); // randomize starting point to avoid low-ARFCN bias
  const tchPoolSet = new Set(tchPool);

  // Expand inSiteBCCHSet to include ±1 — BCCH/TCH adjacency within same site must be avoided
  const inSiteBCCHAdj = new Set(inSiteBCCHSet);
  inSiteBCCHSet.forEach(b => { inSiteBCCHAdj.add(b-1); inSiteBCCHAdj.add(b+1); });

  // Neighbour TCHs from external cells (same band)
  const nbTCH = new Set();
  scored.forEach(c=>(c.tchList||[]).forEach(t=>{const n=Number(t);if(!isNaN(n)&&tchPoolSet.has(n))nbTCH.add(n);}));

  // Hard forbidden: neighbour TCHs + in-site BCCHs (±1) + other-sector TCHs (no repetition)
  const otherSectorTCH = new Set(siteRegTCH);
  const hardForbid = new Set([...nbTCH, ...inSiteBCCHAdj, ...otherSectorTCH]);

  // Soft forbidden: adjacent to OTHER sectors' TCHs (ok as last resort across sectors)
  const otherSectorAdj = new Set();
  siteRegTCH.forEach(t=>{ otherSectorAdj.add(t-1); otherSectorAdj.add(t+1); });

  // Build candidate pools
  const poolA = []; // ideal: clean from nb conflicts AND not adj to other-sector TCHs
  const poolB = []; // relaxed: clean from nb conflicts, may be adj to other-sector TCHs
  for (const a of tchPool) {
    if (hardForbid.has(a)) continue;
    if (!otherSectorAdj.has(a)) poolA.push(a);
    poolB.push(a);
  }

  // intra-sector adjacency (minSep=2) is NEVER relaxed — adjacent freqs in same cell cause ACI
  let list=[], mode="clean";
  // poolC: nb conflict OK, but still avoids intra-site exact reuse AND intra-site adjacency
  const poolC = tchPool.filter(a => !inSiteBCCHAdj.has(a) && !otherSectorTCH.has(a) && !otherSectorAdj.has(a));
  // poolD: nb conflict OK, intra-site adj OK, but no exact intra-site TCH reuse
  const poolD = tchPool.filter(a => !inSiteBCCHAdj.has(a) && !otherSectorTCH.has(a));
  // poolE: last resort — relaxes nb conflict and intra-site adj, but still never reuses a sibling sector's exact TCH
  const poolE = tchPool.filter(a => !inSiteBCCHAdj.has(a) && !otherSectorTCH.has(a));

  list = optimalTCHSelect(poolA, count, 2, siteRegTCH);
  if (list.length >= count) { mode="clean"; }
  else {
    const listB = optimalTCHSelect(poolB, count, 2, siteRegTCH);
    if (listB.length >= list.length) { list=listB; mode=listB.length>=count?"site_adj":"partial"; }
    if (list.length < count) {
      const listC = optimalTCHSelect(poolC, count, 2, siteRegTCH);
      if (listC.length > list.length) { list=listC; mode=listC.length>=count?"nb_reuse":"partial"; }
    }
    if (list.length < count) {
      const listD = optimalTCHSelect(poolD, count, 2, siteRegTCH);
      if (listD.length > list.length) { list=listD; mode=listD.length>=count?"nb_reuse_adj":"partial"; }
    }
    if (list.length < count) {
      const listE = spreadSelect(poolE, count, 2);
      if (listE.length > list.length) { list=listE; mode="reuse"; }
    }
  }

  list.forEach(t=>siteRegTCH.push(t));
  return {list, mode};
}

// ── Cell-to-cell beam overlap (used by BFS tier assignment) ──────────────────
function cellOverlap(la1,lo1,az1,la2,lo2,az2,bw) {
  const dist=haversineKm(la1,lo1,la2,lo2);
  if(dist<0.05) return {fwdS:0,revS:0};
  const bear=compassBearing(la1,lo1,la2,lo2);
  return {
    fwdS:Math.max(0,1-angleDiff(bear,az1)/bw),
    revS:Math.max(0,1-angleDiff((bear+180)%360,az2)/bw)
  };
}

// ── Planning engine ───────────────────────────────────────────────────────────
function planOneSite(site, workingCells, cfg) {
  const {lat,lon,sectors}=site;
  const {firstTierRadius,nccStr,bands,beamWidth}=cfg;
  const nccPool=parseARFCNList(nccStr||"0-7").filter(n=>n>=0&&n<=7);
  const band900=bands[0], band1800=bands[1]; // first = 900 (BCCH+TCH), second = 1800 (TCH only for dual)
  const allBand900=new Set([...getBcchPool(band900||{}),...getTchPool(band900||{})]);
  const allBand1800=new Set(band1800?[...getBcchPool(band1800),...getTchPool(band1800)]:[]);

  // Intra-site register — pre-seeded with any EXISTING cells at the same physical location
  // (dist < 0.05 km) so their BCCHs/TCHs are treated as already-used intra-site frequencies.
  const siteReg={bcch:[],tch900:[],tch1800:[]};
  workingCells.forEach(c=>{
    if(isNaN(c.lat)||isNaN(c.lon)) return;
    if(haversineKm(lat,lon,c.lat,c.lon)>=0.05) return;
    const b=Number(c.bcch); if(!isNaN(b)) siteReg.bcch.push(b);
    (c.tchList||[]).forEach(t=>{
      const n=Number(t); if(isNaN(n)) return;
      if(allBand1800.has(n)) siteReg.tch1800.push(n); else siteReg.tch900.push(n);
    });
  });

  // ── Site-level LAC / RAC / BSC (same value applied to every sector) ─────────
  const siteLacRacBsc = (() => {
    const lrbKey = c => `${c.lac}|${c.rac}|${c.bsc}`;
    const majorityVote = (cands) => {
      if (!cands.length) return {lac:null, rac:null, bsc:null};
      const tally = new Map();
      cands.forEach(c => {
        const k = lrbKey(c);
        if (!tally.has(k)) tally.set(k, {count:0, dist:c.dist||0, c});
        const v = tally.get(k); v.count++;
        if ((c.dist||0) < v.dist) { v.dist = c.dist||0; v.c = c; }
      });
      const best = [...tally.values()].sort((a,b) => b.count - a.count || a.dist - b.dist)[0];
      return {lac:best.c.lac, rac:best.c.rac, bsc:best.c.bsc};
    };

    // Case 1: existing sectors at same physical location → inherit their LAC/RAC/BSC
    const coSite = workingCells.filter(c =>
      !isNaN(c.lat) && !isNaN(c.lon) && haversineKm(lat,lon,c.lat,c.lon) < 0.05 &&
      (c.lac != null || c.rac != null || c.bsc != null)
    );
    if (coSite.length) return majorityVote(coSite);

    // Case 2: new site → pool T1 neighbours from ALL planned sectors combined
    const OVL_LRB = 0.05;
    const pooled = [];
    sectors.forEach(sec => {
      const az = parseFloat(sec.azimuth) || 0;
      workingCells.forEach(c => {
        if (isNaN(c.lat) || isNaN(c.lon)) return;
        if (c.lac == null && c.rac == null && c.bsc == null) return;
        const dist = haversineKm(lat, lon, c.lat, c.lon);
        if (dist < 0.05 || dist > firstTierRadius) return;
        const bear = compassBearing(lat, lon, c.lat, c.lon);
        const fwdS = Math.max(0, 1 - angleDiff(bear, az) / beamWidth);
        const revS = Math.max(0, 1 - angleDiff((bear+180)%360, c.azimuth||0) / beamWidth);
        if (fwdS > OVL_LRB || revS > OVL_LRB) pooled.push({...c, dist});
      });
    });
    if (pooled.length) return majorityVote(pooled);

    // Case 3: no T1 neighbours found — inherit from the nearest cell with LAC/RAC/BSC,
    // regardless of search radius or beam overlap.
    const nearest = workingCells
      .filter(c => !isNaN(c.lat) && !isNaN(c.lon) &&
                   haversineKm(lat,lon,c.lat,c.lon) >= 0.05 &&
                   (c.lac != null || c.rac != null || c.bsc != null))
      .map(c => ({...c, dist: haversineKm(lat,lon,c.lat,c.lon)}))
      .sort((a,b) => a.dist - b.dist);
    if (nearest.length) return {lac:nearest[0].lac, rac:nearest[0].rac, bsc:nearest[0].bsc};
    return {lac:null, rac:null, bsc:null};
  })();

  const sectorResults = sectors.map((sec,idx)=>{
    const az=parseFloat(sec.azimuth)||0;
    const trx900=sec.trx900||0, trx1800=sec.trx1800||0;
    const has900=trx900>0, has1800=trx1800>0;
    // BCCH band: 900 if present, else 1800
    const bcchBand=has900?band900:band1800;
    // TCH counts: subtract 1 BCCH TRX from whichever band carries the BCCH
    const tch900Count=has900?Math.max(0,trx900-1):0;
    const tch1800Count=has900?trx1800:Math.max(0,trx1800-1); // if 900-less, 1800 loses 1 for BCCH
    const bcchPool=getBcchPool(bcchBand);
    const tch900Pool=getTchPool(band900||{});
    const tch1800Pool=band1800?getTchPool(band1800):[];
    const bandSet900=new Set([...getBcchPool(band900||{}),...getTchPool(band900||{})]);

    // Score neighbours
    const scored=workingCells.map(c=>{
      if(isNaN(c.lat)||isNaN(c.lon)) return null;
      const dist=haversineKm(lat,lon,c.lat,c.lon);
      if(dist>cfg.searchRadius||dist<0.05) return null;
      const bear=compassBearing(lat,lon,c.lat,c.lon);
      const fwdS=Math.max(0,1-angleDiff(bear,az)/beamWidth);
      const revS=Math.max(0,1-angleDiff((bear+180)%360,c.azimuth||0)/beamWidth);
      const overlap=fwdS*revS;
      const relevance=dist/(1+overlap*3);
      return {...c,dist,bear,fwdS,revS,overlap,relevance};
    }).filter(Boolean).sort((a,b)=>a.relevance-b.relevance);

    // ── Tier assignment (shared by BCCH planning and neighbour export) ──────
    const OVL = 0.05;
    const BRIDGE_REV = 0.40;
    const hasDirectOverlap = c => {
      if (c.revS <= OVL) return false;
      if (c.fwdS > OVL) return true;
      if (c.revS < BRIDGE_REV) return false;
      return sectors.some((sec2, i2) => {
        if (i2 === idx) return false;
        const az2 = parseFloat(sec2.azimuth) || 0;
        const fwdS2 = Math.max(0, 1 - angleDiff(c.bear, az2) / beamWidth);
        return fwdS2 > OVL;
      });
    };
    // T1: within firstTierRadius + direct beam overlap
    const tier1 = scored.filter(c => c.dist <= firstTierRadius && hasDirectOverlap(c));
    const tier1Names = new Set(tier1.map(c => c.cellName));
    const tier1SiteNames = new Set(tier1.map(c => c.siteName).filter(Boolean));
    // T2: beyond firstTierRadius but direct overlap, OR co-site with T1
    const tier2 = scored.filter(c => {
      if (tier1Names.has(c.cellName)) return false;
      if (c.dist > firstTierRadius && hasDirectOverlap(c)) return true;
      if (c.siteName && tier1SiteNames.has(c.siteName)) return true;
      return false;
    });
    const tier2Names = new Set(tier2.map(c => c.cellName));
    const tier12SiteNames = new Set([...tier1SiteNames, ...tier2.map(c => c.siteName).filter(Boolean)]);
    // ── Tier fine-tuning (3 stages) ──────────────────────────────────────────
    // Stage 1 — Demote T1→T2: one side ≤ OVL AND stronger side < 45%
    //           (weakly one-sided cells that slipped through bridge exception)
    // Stage 2 — Upgrade T2→T1: BOTH fwdS AND revS > 60%, distance-independent
    //           (strong bilateral overlap just beyond the distance cutoff)
    // Stage 3 — Shadow check: T1 candidate C is demoted if a closer confirmed-T1
    //           cell B already has beam overlap with C (P→B→C handover path exists,
    //           so C is not truly in the first reachable ring from P)
    const DEMOTE_MAX  = 0.45;
    const UPGRADE_MIN = 0.60;
    const SHADOW_OVL  = 0.40; // fwdS(B→C) must exceed this for B to shadow C

    const demotedNames  = new Set(); // stage 1
    const upgradedNames = new Set(); // stage 2
    const shadowedNames = new Set(); // stage 3

    // Stage 1
    tier1.forEach(c => {
      if ((c.fwdS <= OVL || c.revS <= OVL) && Math.max(c.fwdS, c.revS) < DEMOTE_MAX)
        demotedNames.add(c.cellName);
    });
    // Stage 2
    tier2.forEach(c => {
      if (c.fwdS > UPGRADE_MIN && c.revS > UPGRADE_MIN)
        upgradedNames.add(c.cellName);
    });
    // Stage 3 — process stage-1/2 adjusted T1 candidates nearest-first
    const candidateT1 = [
      ...tier1.filter(c => !demotedNames.has(c.cellName)),
      ...tier2.filter(c =>  upgradedNames.has(c.cellName)),
    ].sort((a,b) => a.dist - b.dist);
    const confirmedT1 = [];
    candidateT1.forEach(C => {
      const blocked = confirmedT1.some(B => {
        if (B.siteName && C.siteName && B.siteName === C.siteName) return false; // co-site: never shadow each other
        if (angleDiff(B.bear, C.bear) > beamWidth) return false; // B and C in different directions from P — no shadow
        // Case 1: B's beam points toward C — classic handover chain P→B→C
        const {fwdS:fBC} = cellOverlap(B.lat,B.lon,B.azimuth||0, C.lat,C.lon,C.azimuth||0, beamWidth);
        if (fBC > SHADOW_OVL) return true;
        // Case 2: Both are back-beam cells (fwdS≈0, qualified via bridge exception only).
        // Neither is directly faced by the planned sector — keep only the closer one as T1.
        // beamWidth/3 bucket: balance between catching same-direction duplicates and false demotions.
        if (B.fwdS <= OVL && C.fwdS <= OVL && angleDiff(B.bear, C.bear) <= beamWidth/3) return true;
        // Case 3: Both are front-facing (planned sector directly illuminates both) and in the same
        // direction from P. The closer one is the true first-ring cell; the farther is second-hop.
        if (B.fwdS > OVL && C.fwdS > OVL && angleDiff(B.bear, C.bear) <= beamWidth/3) return true;
        return false;
      });
      if (blocked) shadowedNames.add(C.cellName);
      else confirmedT1.push(C);
    });

    const effectiveTier1 = confirmedT1;
    const effectiveTier2 = [
      ...tier2.filter(c => !upgradedNames.has(c.cellName)),
      ...tier1.filter(c => demotedNames.has(c.cellName) || shadowedNames.has(c.cellName)),
      ...tier2.filter(c =>  upgradedNames.has(c.cellName) && shadowedNames.has(c.cellName)),
    ];
    const eff1Names = new Set(effectiveTier1.map(c => c.cellName));
    const eff1SiteNames = new Set(effectiveTier1.map(c => c.siteName).filter(Boolean));
    const eff2Names = new Set(effectiveTier2.map(c => c.cellName));
    const eff12SiteNames = new Set([...eff1SiteNames, ...effectiveTier2.map(c => c.siteName).filter(Boolean)]);
    // Rebuild T3 so no cell already in effective T1/T2 appears twice
    const effectiveTier3 = scored.filter(c => {
      if (eff1Names.has(c.cellName) || eff2Names.has(c.cellName)) return false;
      if (isNaN(c.lat) || isNaN(c.lon)) return false;
      if (c.siteName && eff12SiteNames.has(c.siteName)) return true;
      return [...effectiveTier1, ...effectiveTier2].some(t => {
        if (isNaN(t.lat) || isNaN(t.lon)) return false;
        const {fwdS:f, revS:r} = cellOverlap(t.lat,t.lon,t.azimuth||0, c.lat,c.lon,c.azimuth||0, beamWidth);
        return Math.max(f, r) > OVL;
      });
    });

    // ── BCCH + BCC + NCC (joint selection) ──────────────────────────────────
    // Goal: find (BCCH, NCC, BCC) triplet such that no cell within bsicRadius shares
    // the same combination — i.e. unique BCCH+BSIC combo in that radius.
    // BCCH preference order is governed by beam-overlap passes (T1/T2 avoidance);
    // if no pair is found at full radius, shrink by 80% and retry all passes.

    const nb900 = scored.filter(c => c.bcch !== null && !isNaN(Number(c.bcch)) && bandSet900.has(Number(c.bcch)));
    const allNbBCCHs = [...new Set(nb900.map(c => Number(c.bcch)).filter(b => !isNaN(b)))];
    const tier1BCCHs = new Set(effectiveTier1.filter(c => bandSet900.has(Number(c.bcch))).map(c => Number(c.bcch)));
    const tier2BCCHs = new Set(effectiveTier2.filter(c => bandSet900.has(Number(c.bcch))).map(c => Number(c.bcch)));
    const inSiteAdj = new Set(); siteReg.bcch.forEach(b => { inSiteAdj.add(b-1); inSiteAdj.add(b); inSiteAdj.add(b+1); });
    // inSiteExact: exact BCCHs already assigned to sibling sectors — must never be reused,
    // even in forced mode (forced only relaxes neighbour constraints, not intra-site uniqueness).
    const inSiteExact = new Set(siteReg.bcch);

    // Build ordered BCCH candidates per beam-overlap pass (best separation first, random tiebreak).
    const bcchCands = blocked => bcchPool
      .filter(a => !blocked.has(a) && !inSiteExact.has(a))
      .map(a => ({ a, sep: allNbBCCHs.length ? Math.min(...allNbBCCHs.map(u => Math.abs(a - u))) : 9999 }))
      .sort((x, y) => y.sep - x.sep || Math.random() - 0.5);
    const passes = [
      { mode:"clean",    cands: bcchCands(new Set([...inSiteAdj, ...tier1BCCHs, ...tier2BCCHs])) },
      { mode:"t2_reuse", cands: bcchCands(new Set([...inSiteAdj, ...tier1BCCHs])) },
      { mode:"t1_reuse", cands: bcchCands(inSiteAdj) },
      // forced: relaxes all neighbour constraints but still bans exact intra-site BCCH reuse
      { mode:"forced",   cands: bcchPool.filter(a => !inSiteExact.has(a)).map(a => ({ a, sep:0 })) },
    ];

    // Pre-compute distances once for all workingCells with valid BCCH+NCC+BCC
    const bsicPool = workingCells
      .filter(c => !isNaN(c.lat) && !isNaN(c.lon) &&
                   c.bcch != null && !isNaN(Number(c.bcch)) &&
                   c.ncc != null && !isNaN(Number(c.ncc)) &&
                   c.bcc != null && !isNaN(Number(c.bcc)))
      .map(c => ({ bcch: Number(c.bcch), ncc: Number(c.ncc), bcc: Number(c.bcc), d: haversineKm(lat, lon, c.lat, c.lon) }))
      .filter(c => c.d >= 0.05);

    let bestBCCH = null, bestNCC = null, bestBCC = null, bcchMode = "clean";
    let bsicSearchR = cfg.bsicRadius ?? 50;
    const nccOrd = shuffle(nccPool);
    const bccOrd = shuffle([0,1,2,3,4,5,6,7]);

    outer: while (bsicSearchR >= 1) {
      // Build forbidden set: "${bcch}_${ncc}_${bcc}" keys taken within current radius
      const forbidden = new Set();
      bsicPool.filter(c => c.d <= bsicSearchR).forEach(c => forbidden.add(`${c.bcch}_${c.ncc}_${c.bcc}`));
      for (const pass of passes) {
        for (const { a } of pass.cands) {
          for (const n of nccOrd) {
            for (const b of bccOrd) {
              if (!forbidden.has(`${a}_${n}_${b}`)) {
                bestBCCH = a; bestNCC = n; bestBCC = b; bcchMode = pass.mode; break outer;
              }
            }
          }
        }
      }
      bsicSearchR *= 0.8;
    }
    if (bestBCCH === null) {
      // Shrinking-radius BSIC uniqueness loop exhausted — absolute last resort.
      // Still never reuse a sibling sector's exact BCCH; ignore all other constraints.
      const freePool = bcchPool.filter(a => !inSiteExact.has(a));
      if (freePool.length) {
        bcchMode = "forced";
        bestBCCH = freePool[0];
        bestNCC = nccPool[0] ?? 0;
        const cnt = Array(8).fill(0);
        bsicPool.forEach(c => cnt[c.bcc]++);
        bestBCC = cnt.indexOf(Math.min(...cnt));
      } else {
        // Truly impossible — all BCCHs in the pool are already used by sibling sectors of this site
        bcchMode = "impossible";
        bestBCCH = null; bestNCC = null; bestBCC = null;
      }
    }
    if (bestBCCH !== null) siteReg.bcch.push(bestBCCH);

    // Compute the actual minimum distance to any cell sharing the same (BCCH, NCC, BCC) triplet.
    // This is the true "BSIC+BCCH repeat distance" — null means fully unique in the working network.
    const bsicRepeatDist = (bestBCCH == null || bestNCC == null || bestBCC == null) ? null : (() => {
      const matches = bsicPool.filter(c => c.bcch === bestBCCH && c.ncc === bestNCC && c.bcc === bestBCC);
      return matches.length === 0 ? null : Math.min(...matches.map(c => c.d));
    })();

    const inSiteBCCHSet=new Set([...siteReg.bcch]);

    const makeNb = (c, tier) => ({
      ...c, tier, isFirstTier: tier===1, hasBeamOverlap: true,
      tierLabel: upgradedNames.has(c.cellName) && !shadowedNames.has(c.cellName) ? '1st(upgraded)'
               : shadowedNames.has(c.cellName) ? '2nd(shadowed)'
               : demotedNames.has(c.cellName)  ? '2nd(downgraded)'
               : tier===1 ? '1st' : tier===2 ? '2nd' : '3rd',
      nbRelevance: c.dist / (1 + (c.fwdS + c.revS) * 3),
    });

    // Sort: cells with both overlaps ≈0 rank after any cell with meaningful overlap on at least one side.
    // Within each bucket, lower nbRelevance = higher priority (proximity + overlap bonus).
    const nbSort = (a, b) => {
      const aZero = (a.fwdS <= OVL && a.revS <= OVL) ? 1 : 0;
      const bZero = (b.fwdS <= OVL && b.revS <= OVL) ? 1 : 0;
      return aZero - bZero || a.nbRelevance - b.nbRelevance;
    };
    const externalNeighbors = [
      ...effectiveTier1.map(c => makeNb(c, 1)).sort(nbSort),
      ...effectiveTier2.map(c => makeNb(c, 2)).sort(nbSort),
      ...effectiveTier3.map(c => makeNb(c, 3)).sort(nbSort),
    ].slice(0, cfg.maxNeighbours);

    // TCH assigned via round-robin below — placeholders for now
    return {
      idx,az,trx900,trx1800,has900,has1800,tch900Count,tch1800Count,
      bcchBandName:bcchBand?.name||"—",
      bcch:bestBCCH, bcchMode,
      tch900List:[], tch900Mode:'n/a',
      tch1800List:[], tch1800Mode:'n/a',
      ncc:bestNCC,bcc:bestBCC,
      bsic:bestNCC!=null?`${bestNCC}/${bestBCC}`:'—',
      bsicDec:bestNCC!=null?bestNCC*8+bestBCC:null,
      bsicRepeatDist,
      lac:siteLacRacBsc.lac,rac:siteLacRacBsc.rac,bsc:siteLacRacBsc.bsc,
      externalNeighbors,
      tier1BCCHs:[...tier1BCCHs].sort((a,b)=>a-b),
      allNbBCCHs:allNbBCCHs.sort((a,b)=>a-b),
      stats:{total:scored.length,tier1Count:effectiveTier1.length,tier2Count:effectiveTier2.length,tier3Count:effectiveTier3.length,
             demotedCount:demotedNames.size,upgradedCount:upgradedNames.size,shadowedCount:shadowedNames.size},
      // private fields consumed by round-robin — deleted before returning
      _scored:scored, _inSiteBCCHSet:inSiteBCCHSet,
      _tch900Pool:tch900Pool, _tch1800Pool:tch1800Pool,
    };
  });

  // ── Round-robin TCH assignment ────────────────────────────────────────────
  // Assign 1 TCH per sector per band per round so that each sector's Nth pick
  // is informed by every other sector's (N-1) already-committed TCHs.
  const MODE_RANK = {clean:0,'n/a':0,partial:1,site_adj:2,nb_reuse:3,nb_reuse_adj:4,reuse:5,impossible:6};
  const worseMode = (a,b) => (MODE_RANK[a]??1) >= (MODE_RANK[b]??1) ? a : b;

  const maxRounds = sectorResults.reduce((m,s) => Math.max(m, s.tch900Count, s.tch1800Count), 0);
  const acc900  = sectorResults.map(() => ({list:[], mode:'clean'}));
  const acc1800 = sectorResults.map(() => ({list:[], mode:'clean'}));

  for (let round=0; round<maxRounds; round++) {
    for (let i=0; i<sectorResults.length; i++) {
      const s = sectorResults[i];
      if (acc900[i].list.length < s.tch900Count) {
        const {list,mode} = planTCH(s._tch900Pool, s._scored, s._inSiteBCCHSet, siteReg.tch900, 1);
        acc900[i].list.push(...list);
        acc900[i].mode = worseMode(acc900[i].mode, mode);
      }
      if (acc1800[i].list.length < s.tch1800Count) {
        const {list,mode} = planTCH(s._tch1800Pool, s._scored, new Set(), siteReg.tch1800, 1);
        acc1800[i].list.push(...list);
        acc1800[i].mode = worseMode(acc1800[i].mode, mode);
      }
    }
  }

  // Merge TCH back into results and drop private fields
  sectorResults.forEach((s,i) => {
    s.tch900List  = acc900[i].list.sort((a,b)=>a-b);
    s.tch900Mode  = acc900[i].list.length < s.tch900Count ? 'partial' : acc900[i].mode;
    s.tch1800List = acc1800[i].list.sort((a,b)=>a-b);
    s.tch1800Mode = acc1800[i].list.length < s.tch1800Count ? 'partial' : acc1800[i].mode;
    delete s._scored; delete s._inSiteBCCHSet; delete s._tch900Pool; delete s._tch1800Pool;
  });

  // Post-processing: if a sector ended up with 'clean' mode but one of its TCHs is
  // adjacent (±1) to a sibling sector's TCH, upgrade its mode to 'site_adj' so the
  // badge reflects the actual cross-sector adjacency regardless of planning order.
  const CLEAN_MODES = new Set(['clean','partial','n/a']);
  sectorResults.forEach((sec, i) => {
    ['900','1800'].forEach(band => {
      const modeKey = `tch${band}Mode`;
      if (!CLEAN_MODES.has(sec[modeKey])) return;
      const myTCH = sec[`tch${band}List`];
      if (!myTCH || !myTCH.length) return;
      const hasAdj = sectorResults.some((other, j) => {
        if (j === i) return false;
        return (other[`tch${band}List`] || []).some(t => myTCH.some(m => Math.abs(m - t) === 1));
      });
      if (hasAdj) sec[modeKey] = 'site_adj';
    });
  });

  return sectorResults;
}

function planAllSites(sites,baseCells,cfg) {
  const maxPasses = Math.max(1, cfg.maxPasses ?? 3);

  const toVCell = (site, r) => ({
    cellName:`${site.name}_S${r.idx+1}`, siteName:site.name,
    lat:parseFloat(site.lat), lon:parseFloat(site.lon), azimuth:r.az,
    bcch:r.bcch, tchList:[...r.tch900List,...r.tch1800List],
    ncc:r.ncc, bcc:r.bcc, lac:r.lac, rac:r.rac, bsc:r.bsc, isPlanned:true
  });

  // Score a full pass result: [degradedSectors, t1BcchConflicts] — lower is better.
  // degraded = bcchMode !== 'clean'; t1Conflict = planned BCCH appears in its own tier1BCCHs.
  const scorePass = results => {
    let degraded = 0, conflicts = 0;
    results.forEach(({sectorResults}) => {
      sectorResults.forEach(r => {
        if (r.bcchMode !== 'clean') degraded++;
        if (r.tier1BCCHs && r.tier1BCCHs.includes(r.bcch)) conflicts++;
      });
    });
    return [degraded, conflicts];
  };

  const isBetter = (scoreA, scoreB) =>
    scoreA[0] < scoreB[0] || (scoreA[0] === scoreB[0] && scoreA[1] < scoreB[1]);

  // Pass 1: sequential greedy
  let lastResults = [];
  {
    let wc = [...baseCells];
    lastResults = sites.map(site => {
      const sectorResults = planOneSite({lat:parseFloat(site.lat),lon:parseFloat(site.lon),sectors:site.sectors}, wc, cfg);
      sectorResults.forEach(r => wc.push(toVCell(site, r)));
      return {site, sectorResults};
    });
  }

  let bestResults = lastResults;
  let bestScore = scorePass(lastResults);

  // Passes 2..N: Jacobi iteration — each site re-planned using all OTHER sites'
  // frequencies from the previous pass. Keep the best-scoring pass, not just the last.
  for (let pass = 2; pass <= maxPasses; pass++) {
    const prevVCells = {};
    lastResults.forEach(({site, sectorResults}) => {
      prevVCells[site.name] = sectorResults.map(r => toVCell(site, r));
    });

    const nextResults = sites.map(site => {
      const wc = [...baseCells];
      sites.forEach(s => {
        if (s.name !== site.name) (prevVCells[s.name] || []).forEach(vc => wc.push(vc));
      });
      const sectorResults = planOneSite({lat:parseFloat(site.lat),lon:parseFloat(site.lon),sectors:site.sectors}, wc, cfg);
      return {site, sectorResults};
    });

    lastResults = nextResults;
    const s = scorePass(nextResults);
    if (isBetter(s, bestScore)) { bestScore = s; bestResults = nextResults; }
  }

  return bestResults;
}

function exportAll(allResults) {
  // Sheet 1: Freq Plan
  const freqRows = [];
  allResults.forEach(({site, sectorResults}) => {
    sectorResults.forEach(r => {
      freqRows.push({
        Site: site.name,
        SiteID: site.siteId || "",
        Cell: `${site.name}_S${r.idx+1}`,
        Sector: `S${r.idx+1}`,
        Azimuth: r.az,
        TRX_900: r.trx900,
        TRX_1800: r.trx1800,
        BCCH_Band: r.bcchBandName,
        BCCH: r.bcch,
        BCCH_Sep: "",
        BCCH_Mode: r.bcchMode,
        TCH_900_Count: r.tch900Count,
        TCH_900: r.tch900List.join(" "),
        TCH_900_Mode: r.tch900Mode,
        TCH_1800_Count: r.tch1800Count,
        TCH_1800: r.tch1800List.join(" "),
        TCH_1800_Mode: r.tch1800Mode,
        NCC: r.ncc,
        BCC: r.bcc,
        BSIC: r.bsicDec ?? "",
        BSIC_Repeat_km: r.bsicRepeatDist != null ? Math.round(r.bsicRepeatDist * 10) / 10 : "",
        LAC: r.lac ?? "",
        RAC: r.rac ?? "",
        BSC: r.bsc ?? "",
      });
    });
  });

  // Sheet 2: Neighbour Plan — one row per neighbour pair
  const nbRows = [];
  allResults.forEach(({site, sectorResults}) => {
    sectorResults.forEach(r => {
      const srcCell = `${site.name}_S${r.idx+1}`;
      const srcBCCH = r.bcch ?? "";
      const srcTCH = [...r.tch900List, ...r.tch1800List].join(" ");

      // Intra-site: other sectors of the same physical site → rank 0
      sectorResults.filter(s => s.idx !== r.idx).forEach(s => {
        nbRows.push({
          Source_Cell: srcCell,
          Target_Cell: `${site.name}_S${s.idx+1}`,
          Rank: 0,
          Distance_km: 0,
          Tier: "Intra-site",
          Fwd_Overlap_pct: "",
          Rev_Overlap_pct: "",
          Source_BCCH: srcBCCH,
          Neighbour_BCCH: s.bcch ?? "",
          Source_TCH: srcTCH,
          Neighbour_TCH: [...s.tch900List, ...s.tch1800List].join(" "),
        });
      });

      // External neighbours — already sorted by priority/relevance → rank 1, 2, 3 …
      r.externalNeighbors.forEach((nb, i) => {
        nbRows.push({
          Source_Cell: srcCell,
          Target_Cell: nb.cellName,
          Rank: i + 1,
          Distance_km: Number(nb.dist).toFixed(3),
          Tier: nb.tierLabel || (nb.tier===1?"1st":nb.tier===2?"2nd":"3rd"),
          Fwd_Overlap_pct: Math.round(nb.fwdS * 100),
          Rev_Overlap_pct: Math.round(nb.revS * 100),
          Source_BCCH: srcBCCH,
          Neighbour_BCCH: nb.bcch ?? "",
          Source_TCH: srcTCH,
          Neighbour_TCH: (nb.tchList || []).join(" "),
        });
      });
    });
  });

  const HDR = {
    fill: {patternType:'solid', fgColor:{rgb:'1F4E79'}},
    font: {bold:true, color:{rgb:'FFFFFF'}},
    alignment: {horizontal:'center', vertical:'center'},
  };
  function styledSheet(rows, xSplit) {
    const ws = XLSX.utils.json_to_sheet(rows);
    if (ws['!ref']) {
      const range = XLSX.utils.decode_range(ws['!ref']);
      for (let C = range.s.c; C <= range.e.c; C++) {
        const addr = XLSX.utils.encode_cell({r:0, c:C});
        if (ws[addr]) ws[addr].s = HDR;
      }
    }
    ws['!views'] = [{state:'frozen', xSplit, ySplit:1, topLeftCell: XLSX.utils.encode_cell({r:1, c:xSplit}), activePane:'bottomRight'}];
    return ws;
  }

  const wb = XLSX.utils.book_new();
  wb.Props = { Author:"Ankit Jain", Title:"2G Frequency Plan", CreatedDate:new Date() };
  XLSX.utils.book_append_sheet(wb, styledSheet(freqRows, 4), "Freq Plan");       // freeze after Sector (col D)
  XLSX.utils.book_append_sheet(wb, styledSheet(nbRows, 1), "Neighbour Plan");    // freeze after Source_Cell (col A)
  XLSX.writeFile(wb, "freq_plan.xlsx", {cellStyles:true});
}
